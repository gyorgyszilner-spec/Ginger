<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mozgásvezérelt sávváltós sportkocsi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background-color: #050208; font-family: sans-serif; color: white; }

    .screen { width: 100%; height: 100%; }
    .hidden { display: none !important; }

    /* ---- 1. képernyő: kalibrációs vezérlő ---- */
    #screen-calib { position: relative; background-color: #121212; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #gamepad-container { position: relative; width: 100%; max-width: 640px; height: 280px; display: flex; justify-content: center; align-items: center; }
    .action-btn {
        position: absolute; width: 75px; height: 75px; border-radius: 50%;
        background-color: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.4);
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        font-weight: bold; font-size: 0.8rem; color: white; text-align: center; z-index: 10; line-height: 1.1;
    }
    .action-btn span { font-size: 0.65rem; opacity: 0.7; font-weight: normal; }
    #btn-tl { top: 15px; left: 15px; border-color: #ffb74d; }
    #btn-tr { top: 15px; right: 15px; border-color: #4caf50; }
    #btn-br { bottom: 15px; right: 15px; border-color: #ec407a; }
    .action-btn.active { background-color: rgba(255,255,255,0.3); transform: scale(0.95); }
    #btn-tr.running { background-color: rgba(76,175,80,0.4); }

    #center-panel { display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 20px; width: 100%; max-width: 640px; z-index: 5; }
    #telemetry { font-family: monospace; font-size: 0.62rem; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 5px; width: 250px; text-align: left; border: 1px solid rgba(255,255,255,0.1); line-height: 1.5; }
    #telemetry b { color: #ffca28; }

    .compass-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 8px; width: 150px; height: 150px; flex-shrink: 0; }
    .arrow { display: flex; justify-content: center; align-items: center; background-color: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; font-size: 1.2rem; color: rgba(255,255,255,0.2); }
    .arrow.active { background-color: #00e676; color: #121212; font-weight: bold; box-shadow: 0 0 12px #00e676; }
    #dir-n { grid-column: 2; grid-row: 1; }
    #dir-w { grid-column: 1; grid-row: 2; }
    #dir-c { grid-column: 2; grid-row: 2; background-color: rgba(255,255,255,0.02); font-size: 0.75rem; }
    #dir-e { grid-column: 3; grid-row: 2; }
    #dir-s { grid-column: 2; grid-row: 3; }
    #dir-c.active { background-color: #2196f3; color: white; box-shadow: 0 0 12px #2196f3; }

    #startGameBtn {
        display: none; margin-top: 26px; padding: 16px 34px; font-size: 1rem; font-weight: bold;
        letter-spacing: .5px; color: #121212; background: #00e676; border: none; border-radius: 10px;
        cursor: pointer; box-shadow: 0 0 20px rgba(0,230,118,.4);
    }
    #startGameBtn:active { transform: scale(0.97); }

    #version-badge { position: fixed; top: 4px; left: 50%; transform: translateX(-50%); font-family: monospace; font-size: 0.7rem; color: #ffca28; background: rgba(0,0,0,0.5); padding: 2px 10px; border-radius: 4px; z-index: 100; pointer-events: none; }

    /* ---- 2. képernyő: játék ---- */
    #screen-game { position: relative; display: flex; align-items: center; justify-content: center; background: #050208; }
    canvas { display: block; max-width: 100%; max-height: 100%; background: #000; box-shadow: 0 0 40px rgba(255,90,50,.15); }
    #hud { position: absolute; top: 14px; left: 14px; font-size: 13px; letter-spacing: .5px; background: rgba(10,6,14,.55); padding: 8px 12px; border-radius: 6px; }
    #hud b { color: #ff5a3c; }
    #weather { position: absolute; top: 14px; right: 14px; display: flex; gap: 6px; }
    .wbtn { background: rgba(10,6,14,.55); border: 1px solid rgba(255,255,255,.15); color: #eee; font-size: 12px; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
    .wbtn.active { background: #ff5a3c; border-color: #ff5a3c; color: #1a0a06; font-weight: 600; }
    #help { position: absolute; bottom: 14px; left: 14px; font-size: 12px; color: #bbb; background: rgba(10,6,14,.5); padding: 8px 12px; border-radius: 6px; }
    #resetBtn { position: absolute; top: 14px; left: 14px; font-size: 12px; font-weight: 600; color: #eee; background: rgba(10,6,14,.55); border: 1px solid rgba(255,255,255,.2); padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    #resetBtn:active { transform: scale(0.96); }
</style>
</head>
<body>
<div id="version-badge">v23 - VISSZAALLITVA</div>

<!-- ============ 1. KÉPERNYŐ: KALIBRÁCIÓ ============ -->
<div id="screen-calib" class="screen">
    <div id="gamepad-container">
        <div class="action-btn" id="btn-tl">G1<br><span>KALIBRÁL</span></div>
        <div class="action-btn" id="btn-tr">G2<br><span>INDÍTÁS</span></div>
        <div class="action-btn" id="btn-br">G4<br><span>AKCIÓ</span></div>

        <div id="center-panel">
            <div id="telemetry">Szenzorok: Inaktív</div>
            <div class="compass-grid">
                <div class="arrow" id="dir-n">↑</div>
                <div class="arrow" id="dir-w">←</div>
                <div class="arrow" id="dir-c">KÖZÉP</div>
                <div class="arrow" id="dir-e">→</div>
                <div class="arrow" id="dir-s">↓</div>
            </div>
        </div>
    </div>
    <button id="startGameBtn">JÁTÉK INDÍTÁSA ▶</button>
</div>

<!-- ============ 2. KÉPERNYŐ: JÁTÉK ============ -->
<div id="screen-game" class="screen hidden">
    <canvas id="game" width="1000" height="600"></canvas>
    <div id="crashFlash" style="position:absolute;inset:0;background:#ff1e14;opacity:0;pointer-events:none;"></div>
    <button id="resetBtn">↺ KÖZÉPRE</button>
    <div id="hud">sebesség: <b id="speedVal">0</b> km/h &nbsp;|&nbsp; pont: <b id="scoreVal">0</b> &nbsp;|&nbsp; ütközés: <b id="crashVal">0</b></div>
    <div id="weather">
        <button class="wbtn active" data-w="sunny">napos</button>
        <button class="wbtn" data-w="sunset">naplemente</button>
        <button class="wbtn" data-w="rainy">esős</button>
        <button class="wbtn" data-w="snowy">havas</button>
    </div>
    <div id="help">gyorsítás: hátradőlés &nbsp; lassítás: előredőlés &nbsp; sávváltás: lépj oldalra balra/jobbra<br>(billentyűzettel is: ↑↓ gáz-fék, ←→ / A D sávváltás)</div>
</div>

<script>
// ============================================================
// 1) MOZGÁSÉRZÉKELŐ VEZÉRLŐ (kalibráció + fel/le/balra/jobbra állapotgép)
// ============================================================
const APP_VERSION = "v23 - VISSZAALLITVA";
document.getElementById('version-badge').textContent = APP_VERSION;
document.title = "Mozgásvezérelt sávváltós sportkocsi " + APP_VERSION;

const CONFIG = {
    // --- DŐLÉS (FEL/LE) tengely: AccG_Z alapján, változatlan ---
    TILT_ENTER: 2.5, TILT_EXIT: 1.0,

    // --- LÉPÉS-DETEKTÁLÁS (Acc_Y alapú, amplitúdó-alapú "fel-le kapcsoló") ---
    // A törzscsavarást oldallépésre cseréltük: nem a telefon elfordulását nézzük,
    // hanem az oldalirányú gyorsulás-kilengést. Ez egyszeri ESEMÉNY (mint egy
    // gombnyomás), nem folyamatosan tartott állapot - minden lépés pontosan
    // egy sávot lép a BAL/KÖZÉP/JOBB pozíción, a szélen ütközve megáll.
    STEP_THRESHOLD: 0.9,       // ekkora kilengés azonnal lépésnek számít
    STEP_REARM_THRESHOLD: 0.3, // ez alá kell csillapodnia, mielőtt új lépés jöhet
    STEP_REARM_DWELL_MS: 100,  // ennyi ideig kell a rearm küszöb alatt maradnia (nehogy egy lecsengő lépés hamisan újra-fegyverezzen)
    STEP_SIGN_BAL: 1           // előjel-konvenció: melyik irányú kilengés a "balra lépés" (valós teszten állítva)
};

let isRunning = false;
let guideStarted = false;
let buttonStates = { G1: 0, G2: 0, G4: 0 };

let raw = {
    ori_alpha: null, ori_beta: null, ori_gamma: null,
    acc_x: null, acc_y: null, acc_z: null,
    accG_x: null, accG_y: null, accG_z: null,
    rot_alpha: null, rot_beta: null, rot_gamma: null,
    motion_interval: null
};

let isCalibrated = false, baselineAccGZ = 0;
let tiltState = 'KOZEP', lastTickTime = null;
let tiltStateSince = 0; // biztonsági időzítő: ha a dőlés-állapot túl sokáig "beragad", kényszerítve KOZEP-re állunk

// lépés-detektálás állapota
let stepArmed = true;          // igaz, ha a jel nyugodt volt - készen áll egy új lépésre
let stepRearmLowSince = null;  // mióta van a jel a rearm küszöb alatt
let lastStepEvent = null, lastStepEventTime = 0;

// ezt olvassa a játék gáz/fékhez: 'KOZEP' | 'FEL' | 'LE' (a sávváltás mostantól nem ezen megy, hanem közvetlen lépés-eseményen)
let motionState = 'KOZEP';

const telemetryEl = document.getElementById('telemetry');
const btnTR = document.getElementById('btn-tr');
const startGameBtn = document.getElementById('startGameBtn');

const setupButton = (elementId, key, callbackPress) => {
    const btn = document.getElementById(elementId);
    btn.addEventListener('touchstart', (e) => {
        e.preventDefault(); btn.classList.add('active'); buttonStates[key] = 1;
        if (guideWaitingForAny) startSensors();
        notifyButtonPress(key);
        if (callbackPress) callbackPress();
    }, { passive: false });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); btn.classList.remove('active'); buttonStates[key] = 0; }, { passive: false });
    btn.addEventListener('mousedown', () => {
        btn.classList.add('active'); buttonStates[key] = 1;
        if (guideWaitingForAny) startSensors();
        notifyButtonPress(key);
        if (callbackPress) callbackPress();
    });
    btn.addEventListener('mouseup', () => { btn.classList.remove('active'); buttonStates[key] = 0; });
};
setupButton('btn-tl', 'G1', () => { calibrate(); });
setupButton('btn-tr', 'G2', () => { startSensors(); });
setupButton('btn-br', 'G4', null);

window.addEventListener('load', () => { if (!guideStarted) { guideStarted = true; runGuidedSequence(); } });

const HISTORY_LEN = 7;
let historyAccGZ = [];
function median(arr) { if (arr.length === 0) return 0; const s = [...arr].sort((a, b) => a - b); return s[Math.floor(s.length / 2)]; }
function pushHistory() {
    if (raw.accG_z !== null) { historyAccGZ.push(raw.accG_z); if (historyAccGZ.length > HISTORY_LEN) historyAccGZ.shift(); }
}

function calibrate() {
    baselineAccGZ = historyAccGZ.length > 0 ? median(historyAccGZ) : (raw.accG_z || 0);
    tiltState = 'KOZEP';
    stepArmed = true; stepRearmLowSince = null; lastStepEvent = null;
    laneIndex = 1; playerX = laneX[1]; // sáv is középre áll kalibráláskor
    isCalibrated = true;
}

async function startSensors() {
    if (isRunning) return;
    try {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            if (await DeviceOrientationEvent.requestPermission() !== 'granted') { alert("Szenzor hozzáférés elutasítva (dőlés)!"); return; }
        }
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            if (await DeviceMotionEvent.requestPermission() !== 'granted') { alert("Szenzor hozzáférés elutasítva (gyorsulás)!"); return; }
        }
        window.addEventListener('deviceorientation', handleOrientation);
        window.addEventListener('devicemotion', handleMotion);
        isRunning = true;
        btnTR.classList.add('running'); btnTR.innerHTML = "G2<br><span>FUT...</span>";
        setInterval(sensorTick, 20);
    } catch (err) { alert("Szenzor hiba: " + err); }
}

function handleOrientation(event) { raw.ori_alpha = event.alpha; raw.ori_beta = event.beta; raw.ori_gamma = event.gamma; }

// Kétfázisú lépés-detektálás: amplitúdó-küszöb AZONNAL kivált, az újra-fegyverzéshez
// viszont egy rövid ideig (STEP_REARM_DWELL_MS) tényleg nyugalmi szint alatt kell maradnia
// a jelnek, különben egy lecsengő mozdulat hamisan kiváltana egy második lépést.
function detectStep(accY) {
    if (!isCalibrated || accY === null) return;
    const absY = Math.abs(accY);
    const now = performance.now();

    if (stepArmed) {
        if (absY > CONFIG.STEP_THRESHOLD) {
            const sign = Math.sign(accY);
            const direction = (sign === CONFIG.STEP_SIGN_BAL) ? 'BAL' : 'JOBB';
            onStepDetected(direction);
            stepArmed = false;
            stepRearmLowSince = null;
        }
    } else {
        if (absY < CONFIG.STEP_REARM_THRESHOLD) {
            if (stepRearmLowSince === null) stepRearmLowSince = now;
            else if (now - stepRearmLowSince >= CONFIG.STEP_REARM_DWELL_MS) stepArmed = true;
        } else {
            stepRearmLowSince = null;
        }
    }
}

function onStepDetected(direction) {
    lastStepEvent = direction;
    lastStepEventTime = performance.now();
    if (direction === 'BAL') shiftLane(-1);
    else if (direction === 'JOBB') shiftLane(1);
}

function handleMotion(event) {
    if (event.acceleration) {
        raw.acc_x = event.acceleration.x; raw.acc_y = event.acceleration.y; raw.acc_z = event.acceleration.z;
        detectStep(raw.acc_y);
    }
    if (event.accelerationIncludingGravity) { raw.accG_x = event.accelerationIncludingGravity.x; raw.accG_y = event.accelerationIncludingGravity.y; raw.accG_z = event.accelerationIncludingGravity.z; }
    if (event.rotationRate) { raw.rot_alpha = event.rotationRate.alpha; raw.rot_beta = event.rotationRate.beta; raw.rot_gamma = event.rotationRate.gamma; }
    raw.motion_interval = event.interval;
    pushHistory();
}

function updateTiltState() {
    if (!isCalibrated || historyAccGZ.length === 0) return;
    const deltaZ = median(historyAccGZ) - baselineAccGZ;
    const prev = tiltState;
    if (tiltState === 'KOZEP') { if (deltaZ > CONFIG.TILT_ENTER) tiltState = 'FEL'; else if (deltaZ < -CONFIG.TILT_ENTER) tiltState = 'LE'; }
    else if (tiltState === 'FEL') { if (deltaZ < CONFIG.TILT_EXIT) tiltState = 'KOZEP'; }
    else if (tiltState === 'LE') { if (deltaZ > -CONFIG.TILT_EXIT) tiltState = 'KOZEP'; }
    if (tiltState !== prev) tiltStateSince = performance.now();
    // biztonsági szelep: ha 4 másodpercnél tovább "beragadt" FEL/LE-ben (pl. szenzor-drift miatt),
    // kényszerítve visszaállunk KÖZÉP-re, hogy a gáz/fék ne fagyjon le véglegesen
    if (tiltState !== 'KOZEP' && performance.now() - tiltStateSince > 4000) {
        tiltState = 'KOZEP'; tiltStateSince = performance.now();
    }
}

// a lane (BAL/KOZEP/JOBB) és a dőlés (FEL/KOZEP/LE) mostantól FÜGGETLEN tengelyek,
// ezért mindkettő saját nyilát külön világítjuk ki a kereszt-elrendezésben (akár egyszerre kettőt is)
function updateVisualArrows() {
    document.querySelectorAll('.arrow').forEach(el => el.classList.remove('active'));
    const laneMap = { 0: 'dir-w', 1: 'dir-c', 2: 'dir-e' };
    const tiltMap = { 'FEL': 'dir-n', 'LE': 'dir-s', 'KOZEP': 'dir-c' };
    document.getElementById(laneMap[laneIndex]).classList.add('active');
    document.getElementById(tiltMap[tiltState]).classList.add('active');
}
function fmt(v, d) { return (v === null || v === undefined || isNaN(v)) ? '--' : v.toFixed(d === undefined ? 1 : d); }

function sensorTick() {
    if (!isRunning) return;
    const now = performance.now();
    lastTickTime = now;

    updateTiltState();
    motionState = tiltState;
    updateVisualArrows();

    if (isCalibrated) startGameBtn.style.display = 'block';

    const stepAgoMs = lastStepEvent ? (now - lastStepEventTime) : null;
    telemetryEl.innerHTML = `
        Szenzorok: <b>FUT</b><br>
        Kalibrálva: ${isCalibrated ? 'igen' : '<b>nem</b>'}<br>
        AccG_Z: <b>${fmt(raw.accG_z, 2)}</b>&nbsp; Acc_Y: <b>${fmt(raw.acc_y, 2)}</b><br>
        Dőlés: <b>${tiltState}</b>&nbsp; Sáv: <b>${['BAL','KOZEP','JOBB'][laneIndex]}</b><br>
        Utolsó lépés: <b>${lastStepEvent || '--'}</b> ${stepAgoMs !== null ? '(' + (stepAgoMs / 1000).toFixed(1) + 's)' : ''}
    `;
}

let guideResolveButton = null, guideWaitingForAny = false, guideWaitingForKey = null;
function speak(text) {
    return new Promise((resolve) => {
        if (!('speechSynthesis' in window)) { resolve(); return; }
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'hu-HU'; u.rate = 1; u.onend = resolve; u.onerror = resolve;
        window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
    });
}
function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
function waitForButton(key) {
    return new Promise((resolve) => {
        if (key === 'any') { guideWaitingForAny = true; guideWaitingForKey = null; }
        else { guideWaitingForAny = false; guideWaitingForKey = key; }
        guideResolveButton = () => { guideWaitingForAny = false; guideWaitingForKey = null; guideResolveButton = null; resolve(); };
    });
}
function notifyButtonPress(key) { if (guideResolveButton && (guideWaitingForAny || guideWaitingForKey === key)) guideResolveButton(); }

async function runGuidedSequence() {
    await speak("Állj fel, legyen körülötted legalább egy méter szabad hely. Ha készen állsz, nyomj meg bármelyik gombot.");
    await waitForButton('any');
    await speak("Tartsd a telefont egyenesen magad előtt, majd nyomd meg a kalibráló gombot.");
    await waitForButton('G1');
    await wait(500);
    await speak("Dőlj hátra a telefonnal. Ez lesz a gyorsítás.");
    await wait(3000);
    await speak("Állj egyenesen.");
    await wait(2000);
    await speak("Dőlj előre a telefonnal. Ez lesz a lassítás.");
    await wait(3000);
    await speak("Állj egyenesen.");
    await wait(2000);
    await speak("Most jön a sávváltás. Ez mostantól nem fordulás, hanem egy valódi oldallépés.");
    await wait(2500);
    await speak("Lépj egyet oldalra, balra.");
    await wait(2500);
    await speak("Most lépj egyet jobbra, hogy középre kerülj vissza.");
    await wait(2500);
    await speak("Lépj egyet oldalra, jobbra.");
    await wait(2500);
    await speak("Most lépj egyet balra, hogy középre kerülj vissza.");
    await wait(2500);
    await speak("Kész a kalibráció. Nyomd meg a Játék indítása gombot.");
}

// ============================================================
// 2) A JÁTÉK - VALÓDI 3D (Three.js / WebGL)
// ============================================================
// Minden korábbi 2D-s "kamera-eltolásos" trükk kikerült. Az út egy tényleges,
// (x,z) koordinátákkal rendelkező görbülő 3D szalag, az autók valódi 6 lapú
// téglatestek (BoxGeometry), amiket a GPU vetít és árnyal - innentől nincs
// olyan buta hiba, mint "letört sarok", mert nem kézzel számolt 2D poligonok,
// hanem egy tényleges 3D jelenet.

// ---- valós méretek méterben ----
const LANE_WIDTH = 3.5;
const SHOULDER = 2.2;
const ROAD_WIDTH = LANE_WIDTH * 3;
const SEGMENT_LEN = 8; // egy útszakasz hossza méterben (ebből épül fel a görbe)
const CAR_WIDTH = 1.8, CAR_LENGTH = 4.5, CAR_HEIGHT = 1.6;
const laneX = [-LANE_WIDTH, 0, LANE_WIDTH]; // a 3 sáv középvonalának oldalirányú eltolása méterben

let laneIndex = 1;
function shiftLane(dir) { laneIndex = Math.max(0, Math.min(2, laneIndex + dir)); }

// ---- útgörbe felépítése: valódi (x,z) pontokkal, nem kamera-trükkel ----
function easeIn(a, b, p) { return a + (b - a) * p * p; }
function easeInOut(a, b, p) { return a + (b - a) * ((-Math.cos(p * Math.PI) / 2) + 0.5); }

let segCurves = [];
function addSeg(c) { segCurves.push(c); }
function addRoad(enter, hold, leave, curve) {
    for (let i = 0; i < enter; i++) addSeg(easeIn(0, curve, i / enter));
    for (let i = 0; i < hold; i++) addSeg(curve);
    for (let i = 0; i < leave; i++) addSeg(easeInOut(curve, 0, i / leave));
}
addRoad(20, 15, 0, 0);
addRoad(15, 20, 20, 0.035);
addRoad(20, 15, 0, 0);
addRoad(15, 20, 20, -0.035);
addRoad(20, 15, 0, 0);
addRoad(10, 14, 10, 0.06);
addRoad(10, 14, 10, -0.06);
addRoad(30, 15, 0, 0);

const waypoints = [{ x: 0, z: 0, heading: 0 }];
{
    let heading = 0, px = 0, pz = 0;
    for (let i = 0; i < segCurves.length; i++) {
        const midHeading = heading + segCurves[i] / 2;
        px += Math.sin(midHeading) * SEGMENT_LEN;
        pz += Math.cos(midHeading) * SEGMENT_LEN;
        heading += segCurves[i];
        waypoints.push({ x: px, z: pz, heading });
    }
}
const trackLength = segCurves.length * SEGMENT_LEN;

// FONTOS: ennek pontosan a kamera valódi képernyő-jobb irányával kell megegyeznie, különben
// balra lépés a képen jobbra tolja a kocsit (ez volt a hiba). A camera.lookAt által számolt
// bázisból levezetve: screen-jobb = (-cos(heading), 0, sin(heading)).
function rightVec(heading) { return { x: -Math.cos(heading), z: Math.sin(heading) }; }

// tetszőleges (a pályán megtett) távolsághoz visszaadja a valós (x,z) pontot és irányt
function trackAt(d) {
    d = ((d % trackLength) + trackLength) % trackLength;
    const idx = Math.min(waypoints.length - 2, Math.floor(d / SEGMENT_LEN));
    const t = (d - idx * SEGMENT_LEN) / SEGMENT_LEN;
    const a = waypoints[idx], b = waypoints[idx + 1];
    return { x: a.x + (b.x - a.x) * t, z: a.z + (b.z - a.z) * t, heading: a.heading + (b.heading - a.heading) * t };
}
function worldPos(d, lateral) {
    const p = trackAt(d), r = rightVec(p.heading);
    return { x: p.x + r.x * lateral, z: p.z + r.z * lateral, heading: p.heading };
}

// ============================================================
// THREE.JS JELENET
// ============================================================
const canvas = document.getElementById('game');
const WIDTH = canvas.width, HEIGHT = canvas.height;
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, logarithmicDepthBuffer: true });
renderer.setSize(WIDTH, HEIGHT, false);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(72, WIDTH / HEIGHT, 0.1, 500);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);
const sunLight = new THREE.DirectionalLight(0xffffff, 0.9);
sunLight.position.set(-40, 60, 20);
scene.add(sunLight);

const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(6000, 6000),
    new THREE.MeshLambertMaterial({ color: 0x2f6b3a })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.05;
scene.add(ground);

function buildRibbon(centerOffsetFn, halfWidthFn, color, y) {
    const positions = [], indices = [];
    for (let i = 0; i < waypoints.length; i++) {
        const wp = waypoints[i], r = rightVec(wp.heading);
        const c = centerOffsetFn(i), hw = halfWidthFn(i);
        const cx = wp.x + r.x * c, cz = wp.z + r.z * c;
        positions.push(cx + r.x * hw, y, cz + r.z * hw);
        positions.push(cx - r.x * hw, y, cz - r.z * hw);
    }
    for (let i = 0; i < waypoints.length - 1; i++) {
        const a = i * 2, b = i * 2 + 1, c = (i + 1) * 2, d = (i + 1) * 2 + 1;
        indices.push(a, b, c, b, d, c);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.setIndex(indices);
    geo.computeVertexNormals();
    return new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color, side: THREE.DoubleSide }));
}

function buildDashedLine(centerOffset, halfWidth, color, y, dashLen, gapLen) {
    const period = dashLen + gapLen, step = 1;
    const positions = [], indices = [];
    let vertCount = 0;
    for (let d = 0; d < trackLength - step; d += step) {
        const onA = (d % period) < dashLen, onB = ((d + step) % period) < dashLen;
        if (!onA || !onB) continue;
        const pA = trackAt(d), rA = rightVec(pA.heading);
        const pB = trackAt(d + step), rB = rightVec(pB.heading);
        const cxA = pA.x + rA.x * centerOffset, czA = pA.z + rA.z * centerOffset;
        const cxB = pB.x + rB.x * centerOffset, czB = pB.z + rB.z * centerOffset;
        positions.push(cxA + rA.x * halfWidth, y, czA + rA.z * halfWidth);
        positions.push(cxA - rA.x * halfWidth, y, czA - rA.z * halfWidth);
        positions.push(cxB + rB.x * halfWidth, y, czB + rB.z * halfWidth);
        positions.push(cxB - rB.x * halfWidth, y, czB - rB.z * halfWidth);
        const a = vertCount, b = vertCount + 1, c = vertCount + 2, dd = vertCount + 3;
        indices.push(a, b, c, b, dd, c);
        vertCount += 4;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.setIndex(indices);
    geo.computeVertexNormals();
    return new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color, side: THREE.DoubleSide }));
}

scene.add(buildRibbon(() => 0, () => ROAD_WIDTH / 2 + SHOULDER, 0x6b6b70, 0.0));
// a sávelválasztónak a sáv SZÉLÉN kell lennie (±LANE_WIDTH/2), nem a szomszédos sáv közepén (±LANE_WIDTH) -
// az előző verzióban ide csúszott a hiba, ezért állt meg az autó pont a vonalon, és tűnt túl szélesnek a középső sáv
scene.add(buildDashedLine(-LANE_WIDTH / 2, 0.08, 0xf0f0f0, 0.03, 3, 6));
scene.add(buildDashedLine(LANE_WIDTH / 2, 0.08, 0xf0f0f0, 0.03, 3, 6));

// útmenti fák/táblák - egyszerű téglatestek egyelőre
const propGroup = new THREE.Group();
scene.add(propGroup);
for (let i = 10; i < waypoints.length; i += 9) {
    const side = ((i / 9) | 0) % 2 === 0 ? -1 : 1;
    const wp = waypoints[i], r = rightVec(wp.heading);
    const off = (ROAD_WIDTH / 2 + SHOULDER + 1.6) * side;
    const tree = new THREE.Mesh(
        new THREE.BoxGeometry(1.1, 4, 1.1),
        new THREE.MeshLambertMaterial({ color: 0x1c5a2e })
    );
    tree.position.set(wp.x + r.x * off, 2, wp.z + r.z * off);
    propGroup.add(tree);
}

function makeCarMesh(color) {
    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(CAR_WIDTH, CAR_HEIGHT, CAR_LENGTH),
        new THREE.MeshLambertMaterial({ color })
    );
    mesh.position.y = CAR_HEIGHT / 2;
    return mesh;
}
const playerMesh = makeCarMesh(0xd9241c);
scene.add(playerMesh);

// ---- időjárás: égbolt szín + köd + eső/hó részecskék ----
const WEATHER = {
    sunny: { sky: 0x8fd3f4, fog: 0xbfe3f7, fogFar: 260, particles: null },
    sunset: { sky: 0x5b2a63, fog: 0xb35a4a, fogFar: 220, particles: null },
    rainy: { sky: 0x5a6570, fog: 0x8a95a0, fogFar: 130, particles: 'rain' },
    snowy: { sky: 0xc9d6e0, fog: 0xdde6ec, fogFar: 120, particles: 'snow' }
};
let currentWeather = 'sunny';
let particlePoints = null;
function applyWeather() {
    const w = WEATHER[currentWeather];
    scene.background = new THREE.Color(w.sky);
    scene.fog = new THREE.Fog(w.fog, 20, w.fogFar);
    if (particlePoints) { scene.remove(particlePoints); particlePoints = null; }
    if (w.particles) {
        const n = 400;
        const positions = new Float32Array(n * 3);
        for (let i = 0; i < n; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 120;
            positions[i * 3 + 1] = Math.random() * 40;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 120;
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        const mat = new THREE.PointsMaterial({
            color: w.particles === 'rain' ? 0xaaccee : 0xffffff,
            size: w.particles === 'rain' ? 0.25 : 0.35
        });
        particlePoints = new THREE.Points(geo, mat);
        scene.add(particlePoints);
    }
}
applyWeather();
document.querySelectorAll('.wbtn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.wbtn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentWeather = btn.dataset.w;
        applyWeather();
    });
});
function updateParticles(dt) {
    if (!particlePoints) return;
    const fallSpeed = WEATHER[currentWeather].particles === 'rain' ? 28 : 3.2;
    const pos = particlePoints.geometry.attributes.position;
    for (let i = 0; i < pos.count; i++) {
        let y = pos.getY(i) - fallSpeed * dt;
        if (y < 0) y = 40;
        pos.setY(i, y);
    }
    pos.needsUpdate = true;
    particlePoints.position.set(playerWorld.x, 0, playerWorld.z);
}

// ============================================================
// JÁTÉKÁLLAPOT
// ============================================================
const maxSpeed = 45;      // m/s (~162 km/h)
const accel = 14;         // m/s^2
const braking = -24;      // m/s^2

let position = 0, distanceTraveled = 0, playerLateralX = laneX[1], speed = 0;
let score = 0, crashCount = 0, crashFlash = 0, invulnerable = false;
let playerWorld = { x: 0, z: 0 };

const CHASE_DIST = 7.5, CHASE_HEIGHT = 3.2, LOOKAHEAD = 12;

const carColors = [0x3d7dff, 0xffd23d, 0x8f3dff, 0x3dffb0, 0xff8f3d];
const trafficSpeed = maxSpeed * 0.42;
const startClearZone = 400;   // ennyi méterig üres a pálya az elején
const learnZoneLength = 500;  // ez után is még ilyen hosszan tart a ritka tanuló-szakasz
const minCarGap = 300, maxCarGap = 500;              // normál (végleges) térköz méterben
const learnMinCarGap = 500, learnMaxCarGap = 800;    // tanuló-szakaszban ennél is ritkábban
const spawnLookahead = 260;
let aiCars = [];
let nextSpawnZ = startClearZone;
function nextGap(z) {
    const learnEnd = startClearZone + learnZoneLength;
    if (z < learnEnd) {
        const t = Math.min(1, (z - startClearZone) / learnZoneLength);
        const gMin = learnMinCarGap + (minCarGap - learnMinCarGap) * t;
        const gMax = learnMaxCarGap + (maxCarGap - learnMaxCarGap) * t;
        return gMin + Math.random() * (gMax - gMin);
    }
    return minCarGap + Math.random() * (maxCarGap - minCarGap);
}
function updateTraffic(dt) {
    aiCars.forEach(c => c.z += trafficSpeed * dt);
    while (nextSpawnZ < distanceTraveled + spawnLookahead) {
        const lane = Math.floor(Math.random() * 3);
        const color = carColors[Math.floor(Math.random() * carColors.length)];
        const mesh = makeCarMesh(color);
        scene.add(mesh);
        aiCars.push({ z: nextSpawnZ, lane, mesh });
        nextSpawnZ += nextGap(nextSpawnZ);
    }
    // akit lehagytunk, az véglegesen megszűnik, de csak miután ténylegesen elhaladt a kamera mögé is -
    // a kamera CHASE_DIST-tel a referenciapont mögött van, úgyhogy egy kis ráhagyás nélkül még jól
    // látható közelségben tűnt volna el hirtelen, ahelyett hogy folyamatosan elhaladna mellettünk
    const despawnBehind = CHASE_DIST + 18;
    const stillAhead = [], toRemove = [];
    aiCars.forEach(c => (c.z > distanceTraveled - despawnBehind ? stillAhead : toRemove).push(c));
    toRemove.forEach(c => scene.remove(c.mesh));
    aiCars = stillAhead;
}

const keys = {};
window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (!keys[k]) {
        if (k === 'arrowleft' || k === 'a') shiftLane(-1);
        if (k === 'arrowright' || k === 'd') shiftLane(1);
    }
    keys[k] = true;
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

let gameActive = false;
function resetGame() {
    position = 0; distanceTraveled = 0; laneIndex = 1; playerLateralX = laneX[1]; speed = 0;
    score = 0; crashCount = 0; crashFlash = 0; invulnerable = false;
    aiCars.forEach(c => scene.remove(c.mesh));
    aiCars = []; nextSpawnZ = startClearZone;
}
document.getElementById('resetBtn').addEventListener('click', () => {
    laneIndex = 1; playerLateralX = laneX[1];
    speed = 0; // "vissza az út közepére, 0 sebességgel"
    crashFlash = 0; invulnerable = false;
    tiltState = 'KOZEP'; tiltStateSince = performance.now();
    stepArmed = true; stepRearmLowSince = null;
});
startGameBtn.addEventListener('click', () => {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => {});
    document.getElementById('screen-calib').classList.add('hidden');
    document.getElementById('screen-game').classList.remove('hidden');
    resetGame();
    gameActive = true;
});

function update(dt) {
    distanceTraveled += speed * dt;
    position = distanceTraveled;

    playerLateralX += (laneX[laneIndex] - playerLateralX) * Math.min(1, dt * 8);

    // a telefon-mozgás gyorsítás/lassulás iránya a korábbi teszt alapján fordítva volt,
    // ezért itt LE = gyorsítás, FEL = fékezés (a fizikai "hátradőlés = gyorsítás" élmény változatlan)
    if (keys['arrowup'] || keys['w'] || motionState === 'LE') speed += accel * dt;
    else if (keys['arrowdown'] || keys['s'] || motionState === 'FEL') speed += braking * dt;
    // sem gáz, sem fék: az autó megtartja a sebességét, nem lassul magától
    speed = Math.max(0, Math.min(maxSpeed, speed));

    updateTraffic(dt);

    if (!invulnerable) {
        for (const c of aiCars) {
            const forwardDist = c.z - distanceTraveled;
            if (c.lane === laneIndex && forwardDist >= 0 && forwardDist < CAR_LENGTH + 1) {
                speed *= 0.3; crashCount++; crashFlash = 1; invulnerable = true;
                setTimeout(() => invulnerable = false, 900);
                break;
            }
        }
    }
    crashFlash = Math.max(0, crashFlash - dt * 1.6);
    document.getElementById('crashFlash').style.opacity = (crashFlash * 0.5).toFixed(2);

    score += speed * dt;
    document.getElementById('speedVal').textContent = Math.round(speed * 3.6);
    document.getElementById('scoreVal').textContent = Math.floor(score);
    document.getElementById('crashVal').textContent = crashCount;

    // --- saját autó és kamera a valódi útgörbe pontján ---
    const p = worldPos(distanceTraveled, playerLateralX);
    playerWorld = { x: p.x, z: p.z };
    playerMesh.position.set(p.x, CAR_HEIGHT / 2, p.z);
    playerMesh.rotation.y = p.heading;

    const f = { x: Math.sin(p.heading), z: Math.cos(p.heading) };
    camera.position.set(p.x - f.x * CHASE_DIST, CHASE_HEIGHT, p.z - f.z * CHASE_DIST);
    camera.lookAt(p.x + f.x * LOOKAHEAD, CAR_HEIGHT * 0.7, p.z + f.z * LOOKAHEAD);

    // --- szembejövő autók valódi 3D pozícióba állítása ---
    aiCars.forEach(c => {
        const wp = worldPos(c.z, laneX[c.lane]);
        c.mesh.position.set(wp.x, CAR_HEIGHT / 2, wp.z);
        c.mesh.rotation.y = wp.heading;
    });

    updateParticles(dt);
}

let lastTime = performance.now();
function frame(now) {
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    if (gameActive) {
        try {
            update(dt);
            renderer.render(scene, camera);
        } catch (err) {
            // egy esetleges hiba SOHA ne állíthassa meg némán a teljes ciklust -
            // e nélkül egyetlen frame-beli kivétel után a mozgás/gombok "eltűntek" volna,
            // mert a requestAnimationFrame lánc megszakadt, miközben a billentyű-eseménykezelők
            // továbbra is lefutottak, csak semmi sem jelenítette meg a hatásukat
            console.error('Frame hiba (a ciklus folytatódik):', err);
        }
    }
    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
