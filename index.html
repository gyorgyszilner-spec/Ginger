<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fektetett Szenzoros Gamepad</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212;
            font-family: sans-serif;
            color: white;
        }

        /* Fektetett elrendezés (Mindent a fekvő képernyőhöz igazítunk) */
        #gamepad-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        /* Funkcionálissá tett Sarokgombok a hüvelykujjaknak */
        .action-btn {
            position: absolute;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.12);
            border: 2px solid rgba(255, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.8rem;
            color: white;
            text-align: center;
            z-index: 10;
            line-height: 1.1;
        }
        .action-btn span {
            font-size: 0.65rem;
            opacity: 0.7;
            font-weight: normal;
        }
        /* Egyedi színek a funkcióknak */
        #btn-tl { top: 15px; left: 15px; border-color: #ffb74d; } /* Kalibrálás */
        #btn-tr { top: 15px; right: 15px; border-color: #4caf50; } /* Indítás */
        #btn-bl { bottom: 15px; left: 15px; border-color: #29b6f6; } /* Mentés */
        #btn-br { bottom: 15px; right: 15px; border-color: #ec407a; } /* Akció */

        .action-btn.active {
            background-color: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }
        #btn-tr.running { background-color: rgba(76, 175, 80, 0.4); }

        /* Középső panel */
        #center-panel {
            display: flex;
            flex-direction: row; /* Fektetett módban egymás mellett van az infó és a nyíl */
            justify-content: center;
            align-items: center;
            gap: 30px;
            width: 100%;
            max-width: 600px;
            z-index: 5;
        }

        /* Élő telemetria */
        #telemetry {
            font-family: monospace;
            font-size: 0.75rem;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 5px;
            width: 240px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 8-irányú Nyilak */
        .compass-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            width: 160px;
            height: 160px;
        }
        .arrow {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.2);
        }
        .arrow.active {
            background-color: #00e676;
            color: #121212;
            font-weight: bold;
            box-shadow: 0 0 12px #00e676;
        }
        .center-dot { background-color: transparent; border: none; }
    </style>
</head>
<body>
<!-- === ELSŐ RÉSZ VÉGE === -->

<!-- === MÁSODIK RÉSZ KEZDETE === -->
    <div id="gamepad-container">
        <!-- Átprogramozott Sarokgombok -->
        <div class="action-btn" id="btn-tl">G1<br><span>KALIBRÁL</span></div>
        <div class="action-btn" id="btn-tr">G2<br><span>INDÍTÁS</span></div>
        <div class="action-btn" id="btn-bl">G3<br><span>CSV MENTÉS</span></div>
        <div class="action-btn" id="btn-br">G4<br><span>AKCIÓ</span></div>

        <div id="center-panel">
            <div id="telemetry">
                Szenzorok: Inaktív<br>
                Dőlés (Fel/Le): 0°<br>
                Gyorsulás X: 0.00 m/s²<br>
                Kormány-integrál: 0.00<br>
                Rekordok: 0
            </div>

            <!-- 8-irányú vizuális mátrix -->
            <div class="compass-grid">
                <div class="arrow" id="dir-nw">↖</div>
                <div class="arrow" id="dir-n">↑</div>
                <div class="arrow" id="dir-ne">↗</div>
                <div class="arrow" id="dir-w">←</div>
                <div class="center-dot"></div>
                <div class="arrow" id="dir-e">→</div>
                <div class="arrow" id="dir-sw">↙</div>
                <div class="arrow" id="dir-s">↓</div>
                <div class="arrow" id="dir-se">↘</div>
            </div>
        </div>
    </div>

    <script>
        // Logikai konfiguráció (Fektetett módhoz igazítva)
        const CONFIG = {
            pitchDeadzone: 6,       // Fel-le holttér fokban
            accelDeadzone: 0.4,     // Gyorsulási holttér (m/s²) a zaj kiszűrésére
            steeringDecay: 0.96,    // Visszatérési sebesség 0-ra mozgás nélkül
            steeringMax: 10.0,      // Virtuális kormány maximum értéke
            steeringThreshold: 1.5  // Ezen érték felett gyullad ki a Bal/Jobb gomb
        };

        // Állapotváltozók
        let telemetryData = [];
        let isRunning = false;
        let pitchZero = 0;          // Kalibrált alaphelyzet (Fel-Le)
        
        let currentPitch = 0;
        let currentAccelX = 0;      // FEKTETETT MÓDBAN AZ X TENGELY KELLETT!
        let virtualSteering = 0;    // Integrált kormányérték

        let buttonStates = { G1: 0, G2: 0, G3: 0, G4: 0 };
        let directionStates = { UP: 0, DOWN: 0, LEFT: 0, RIGHT: 0 };

        const telemetryEl = document.getElementById('telemetry');
        const btnTR = document.getElementById('btn-tr'); // Az indító gombunk

        // Érintések kezelése és a Funkciók bekötése
        const setupButton = (elementId, key, callbackPress) => {
            const btn = document.getElementById(elementId);
            
            const activate = (e) => { 
                e.preventDefault(); 
                btn.classList.add('active'); 
                buttonStates[key] = 1; 
                if (callbackPress) callbackPress();
            };
            const deactivate = (e) => { 
                e.preventDefault(); 
                btn.classList.remove('active'); 
                buttonStates[key] = 0; 
            };
            
            btn.addEventListener('touchstart', activate, {passive: false});
            btn.addEventListener('touchend', deactivate, {passive: false});
            btn.addEventListener('touchcancel', deactivate, {passive: false});
        };

        // Gombok összekötése a funkciókkal
        setupButton('btn-tl', 'G1', () => { pitchZero = currentPitch; }); // G1 = Kalibrálás
        setupButton('btn-tr', 'G2', () => { startSensors(); });           // G2 = Indítás
        setupButton('btn-bl', 'G3', () => { saveCSVData(); });            // G3 = Mentés
        setupButton('btn-br', 'G4', null);                                // G4 = Szabad akció gomb
// === MÁSODIK RÉSZ VÉGE ===

// === HARMADIK RÉSZ KEZDETE ===
        // Szenzorok indítása G2 megnyomásakor
        async function startSensors() {
            if (isRunning) return;
            
            try {
                // iOS Specifikus engedélykérés
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const orientationPerm = await DeviceOrientationEvent.requestPermission();
                    const motionPerm = await DeviceMotionEvent.requestPermission();
                    if (orientationPerm !== 'granted' || motionPerm !== 'granted') {
                        alert("Szenzor hozzáférés elutasítva!");
                        return;
                    }
                }

                window.addEventListener('deviceorientation', handleOrientation);
                window.addEventListener('devicemotion', handleMotion);
                
                isRunning = true;
                btnTR.classList.add('running');
                btnTR.innerHTML = "G2<br><span>FUT...</span>";

                // Biztos adatgyűjtés 50Hz-en (20ms)
                setInterval(recordDataTick, 20);

            } catch (err) {
                alert("Szenzor hiba: " + err);
            }
        }

        // Fektetett módban a gamma (vagy az oldalsó billentés) változik, de a legbiztosabb a tisztított gamma figyelése
        function handleOrientation(event) {
            // Fektetett módban az előre-hátra dőlést a gamma tengely reprezentálja jobban!
            if (event.gamma !== null) {
                currentPitch = event.gamma; 
            }
        }

        // Fektetett módban a telefon balra-jobbra rántása a rövid X tengely mentén történik!
        function handleMotion(event) {
            let accX = event.accelerationWithoutGravity ? event.accelerationWithoutGravity.x : null;
            
            if (accX !== null) {
                // Zajszűrés
                if (Math.abs(accX) < CONFIG.accelDeadzone) {
                    currentAccelX = 0;
                    virtualSteering *= CONFIG.steeringDecay; // Lassú visszaállás
                } else {
                    currentAccelX = accX;
                    // FOLYAMATOS INTEGRÁLÁS
                    // Fektetett módban a rántás iránya szerint adja hozzá az értéket
                    virtualSteering += (accX * 0.25); 
                }
                virtualSteering = Math.max(-CONFIG.steeringMax, Math.min(CONFIG.steeringMax, virtualSteering));
            }
        }

        // Fizikai és Logikai Tick minden 20 ms-ban
        function recordDataTick() {
            if (!isRunning) return;

            // 1. FEL-LE dőlés számítása (Fektetett korrekcióval)
            let relativePitch = currentPitch - pitchZero;
            directionStates.UP = 0;
            directionStates.DOWN = 0;

            // Fektetett tartástól függően lehet, hogy a +- jelet fordítani kell, most a natív dőlést nézi
            if (relativePitch > CONFIG.pitchDeadzone) {
                directionStates.DOWN = 1;
            } else if (relativePitch < -CONFIG.pitchDeadzone) {
                directionStates.UP = 1;
            }

            // 2. JOBBRA-BALRA integrált kormány számítása
            directionStates.LEFT = 0;
            directionStates.RIGHT = 0;

            if (virtualSteering > CONFIG.steeringThreshold) {
                directionStates.RIGHT = 1;
            } else if (virtualSteering < -CONFIG.steeringThreshold) {
                directionStates.LEFT = 1;
            }

            // Nyilak kigyújtása
            updateVisualArrows();

            // Telemetria frissítése
            telemetryEl.innerHTML = `
                Szenzorok: FUT<br>
                Dőlés (Fel/Le): ${relativePitch.toFixed(1)}° (${directionStates.UP ? 'FEL' : directionStates.DOWN ? 'LE' : '0'})<br>
                Gyorsulás X: ${currentAccelX.toFixed(2)} m/s²<br>
                Kormány-integrál: ${virtualSteering.toFixed(2)} (${directionStates.LEFT ? 'BAL' : directionStates.RIGHT ? 'JOBB' : '0'})<br>
                Rekordok: ${telemetryData.length}
            `;

            // Adatmentés a memóriába
            telemetryData.push({
                timestamp: Date.now(),
                pitch: relativePitch.toFixed(2),
                accelX: currentAccelX.toFixed(2),
                steering: virtualSteering.toFixed(2),
                dir_UP: directionStates.UP,
                dir_DOWN: directionStates.DOWN,
                dir_LEFT: directionStates.LEFT,
                dir_RIGHT: directionStates.RIGHT,
                btn_G1: buttonStates.G1,
                btn_G2: buttonStates.G2,
                btn_G3: buttonStates.G3,
                btn_G4: buttonStates.G4
            });
        }

        function updateVisualArrows() {
            document.querySelectorAll('.arrow').forEach(el => el.classList.remove('active'));

            const u = directionStates.UP;
            const d = directionStates.DOWN;
            const l = directionStates.LEFT;
            const r = directionStates.RIGHT;

            if (u && !l && !r) document.getElementById('dir-n').classList.add('active');
            if (d && !l && !r) document.getElementById('dir-s').classList.add('active');
            if (l && !u && !d) document.getElementById('dir-w').classList.add('active');
            if (r && !u && !d) document.getElementById('dir-e').classList.add('active');
            
            if (u && r) document.getElementById('dir-ne').classList.add('active');
            if (u && l) document.getElementById('dir-nw').classList.add('active');
            if (d && r) document.getElementById('dir-se').classList.add('active');
            if (d && l) document.getElementById('dir-sw').classList.add('active');
        }

        // STABIL, MOBILRA OPTIMALIZÁLT BLOB ALAPÚ CSV MENTÉS
        function saveCSVData() {
            if (telemetryData.length === 0) {
                alert("Nincs menthető adat! Indítsd el a mérést a G2 gombbal.");
                return;
            }

            let csvRows = [];
            csvRows.push("Idobelyeg,Doles_Pitch,Gyorsulas_X,Kormany_Integral,FEL,LE,BAL,JOBB,G1_Kalib,G2_Start,G3_Save,G4_Action");

            telemetryData.forEach(row => {
                csvRows.push(`${row.timestamp},${row.pitch},${row.accelX},${row.steering},${row.dir_UP},${row.dir_DOWN},${row.dir_LEFT},${row.dir_RIGHT},${row.btn_G1},${row.btn_G2},${row.btn_G3},${row.btn_G4}`);
            });

            const csvString = csvRows.join("\n");
            // Blob-ot használunk string helyett, ezt a mobilböngészők nem tudják blokkolni
            const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement("a");
            link.href = url;
            link.setAttribute("download", `fektetett_szenzor_adatok_${Date.now()}.csv`);
            document.body.appendChild(link);
            link.click();
            
            // Tisztítás
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
<!-- === HARMADIK RÉSZ VÉGE === -->
