<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Szenzoros Gamepad Teszt</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212;
            font-family: sans-serif;
            color: white;
        }

        /* Vezérlő felület elrendezése */
        #gamepad-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        /* Sarokgombok (Hüvelykujjhoz méretezve) */
        .action-btn {
            position: absolute;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            z-index: 10;
        }
        .action-btn.active {
            background-color: rgba(233, 30, 99, 0.7);
            border-color: #e91e63;
            transform: scale(0.95);
        }
        #btn-tl { top: 20px; left: 20px; }
        #btn-tr { top: 20px; right: 20px; }
        #btn-bl { bottom: 20px; left: 20px; }
        #btn-br { bottom: 20px; right: 20px; }

        /* Középső panel az infókkal és nyilakkal */
        #center-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 400px;
            z-index: 5;
        }

        /* Rendszergombok (Felül középen) */
        .system-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .sys-btn {
            padding: 10px 15px;
            background-color: #333;
            border: 1px solid #555;
            color: white;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .sys-btn:active { background-color: #555; }
        #save-btn { background-color: #2e7d32; border-color: #4caf50; }

        /* Élő telemetria kijelző */
        #telemetry {
            font-family: monospace;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            width: 100%;
            margin-bottom: 20px;
            text-align: left;
        }

        /* 8-irányú Iránytű / Nyilak */
        .compass-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
            width: 220px;
            height: 220px;
        }
        .arrow {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 1.4rem;
            color: rgba(255,255,255,0.3);
            transition: all 0.1s ease;
        }
        .arrow.active {
            background-color: #00e676;
            color: #121212;
            font-weight: bold;
            box-shadow: 0 0 15px #00e676;
            transform: scale(1.05);
        }
        .center-dot {
            background-color: transparent;
            border: none;
        }
    </style>
</head>
<body>
<!-- === ELSŐ RÉSZ VÉGE === -->

<!-- === MÁSODIK RÉSZ KEZDETE === -->
    <div id="gamepad-container">
        <!-- Akciógombok -->
        <div class="action-btn" id="btn-tl">G1</div>
        <div class="action-btn" id="btn-tr">G2</div>
        <div class="action-btn" id="btn-bl">G3</div>
        <div class="action-btn" id="btn-br">G4</div>

        <!-- Középső vezérlő és visszajelző mag -->
        <div id="center-panel">
            <div class="system-controls">
                <button class="sys-btn" id="start-btn">Engedélyezés & Indítás</button>
                <button class="sys-btn" id="calib-btn">Kalibrálás</button>
                <button class="sys-btn" id="save-btn">CSV Mentés</button>
            </div>

            <div id="telemetry">
                Dőlés (Fel/Le): 0° (0)<br>
                Gyorsulás Y: 0.00 m/s²<br>
                Kormány-integrál: 0.00 (0)<br>
                Rekordok száma: 0
            </div>

            <!-- 8-irányú vizuális mátrix -->
            <div class="compass-grid">
                <div class="arrow" id="dir-nw">↖</div>
                <div class="arrow" id="dir-n">↑</div>
                <div class="arrow" id="dir-ne">↗</div>
                <div class="arrow" id="dir-w">←</div>
                <div class="center-dot"></div>
                <div class="arrow" id="dir-e">→</div>
                <div class="arrow" id="dir-sw">↙</div>
                <div class="arrow" id="dir-s">↓</div>
                <div class="arrow" id="dir-se">↘</div>
            </div>
        </div>
    </div>

    <script>
        // Logikai konfigurációs értékek (Finomhangolható)
        const CONFIG = {
            pitchDeadzone: 6,       // Fel-le dőlési holttér fokban
            pitchMax: 25,           // Maximális dőlési határ fokban
            accelDeadzone: 0.4,     // Gyorsulási holttér (m/s²), ez alatt kiszűrjük a zajt
            steeringDecay: 0.95,    // Milyen gyorsan térjen vissza magától a kormány 0-ra, ha nincs semmi mozgás (0.95 = lassú lecsengés)
            steeringMax: 10.0,      // A virtuális kormány maximális értéke kitérésnél
            steeringThreshold: 1.5  // Ezen érték felett aktiválódik a Balra/Jobbra parancs
        };

        // Állapotváltozók
        let telemetryData = [];
        let isRunning = false;
        let pitchZero = 0;          // Kalibrált alaphelyzet (Fel-Le)
        
        // Aktuális szenzoros és számított állapotok
        let currentPitch = 0;
        let currentAccelY = 0;
        let virtualSteering = 0;    // Az integrált jobbra-balra kormányértékünk

        // Gombok fizikai állapota (0 vagy 1)
        let buttonStates = { G1: 0, G2: 0, G3: 0, G4: 0 };
        // Irányok digitális állapota
        let directionStates = { UP: 0, DOWN: 0, LEFT: 0, RIGHT: 0 };

        // UI Elemek kigyűjtése
        const telemetryEl = document.getElementById('telemetry');
        const startBtn = document.getElementById('start-btn');
        const calibBtn = document.getElementById('calib-btn');
        const saveBtn = document.getElementById('save-btn');

        // Gomb-érintések lekezelése (Multi-touch támogatással)
        const setupButton = (elementId, key) => {
            const btn = document.getElementById(elementId);
            const activate = (e) => { e.preventDefault(); btn.classList.add('active'); buttonStates[key] = 1; };
            const deactivate = (e) => { e.preventDefault(); btn.classList.remove('active'); buttonStates[key] = 0; };
            
            btn.addEventListener('touchstart', activate, {passive: false});
            btn.addEventListener('touchend', deactivate, {passive: false});
            btn.addEventListener('touchcancel', deactivate, {passive: false});
        };
        setupButton('btn-tl', 'G1');
        setupButton('btn-tr', 'G2');
        setupButton('btn-bl', 'G3');
        setupButton('btn-br', 'G4');

        // Szenzorok aktiválása és engedélykérés (iOS 13+ kompatibilis)
        startBtn.addEventListener('click', async () => {
            if (isRunning) return;
            
            try {
                // iOS Engedélykérés
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const orientationPerm = await DeviceOrientationEvent.requestPermission();
                    const motionPerm = await DeviceMotionEvent.requestPermission();
                    if (orientationPerm !== 'granted' || motionPerm !== 'granted') {
                        alert("Szenzor hozzáférés megtagadva!");
                        return;
                    }
                }

                window.addEventListener('deviceorientation', handleOrientation);
                window.addEventListener('devicemotion', handleMotion);
                
                isRunning = true;
                startBtn.textContent = "Fut...";
                startBtn.style.backgroundColor = "#1b5e20";

                // Adatrögzítő ciklus indítása (50Hz - 20ms-enként)
                setInterval(recordDataTick, 20);

            } catch (err) {
                alert("Hiba a szenzorok indításakor: " + err);
            }
        });

        // Kalibrációs gomb: az aktuális dőlést teszi meg nullpontnak
        calibBtn.addEventListener('click', () => {
            pitchZero = currentPitch;
        });
// === MÁSODIK RÉSZ VÉGE ===

// === HARMADIK RÉSZ KEZDETE ===
        // Fel-Le dőlés figyelése (Device Orientation)
        function handleOrientation(event) {
            if (event.beta !== null) {
                currentPitch = event.beta;
            }
        }

        // Jobbra-Balra Gyorsulás figyelése és integrálása (Device Motion)
        function handleMotion(event) {
            let accY = event.accelerationWithoutGravity ? event.accelerationWithoutGravity.y : null;
            
            if (accY !== null) {
                if (Math.abs(accY) < CONFIG.accelDeadzone) {
                    currentAccelY = 0;
                    virtualSteering *= CONFIG.steeringDecay;
                } else {
                    currentAccelY = accY;
                    virtualSteering += (accY * 0.2); 
                }
                virtualSteering = Math.max(-CONFIG.steeringMax, Math.min(CONFIG.steeringMax, virtualSteering));
            }
        }

        // Logikai feldolgozás és adatrögzítés minden ciklusban (Tick)
        function recordDataTick() {
            if (!isRunning) return;

            // 1. FEL-LE DIGITÁLIS JEL FELDOLGOZÁSA
            let relativePitch = currentPitch - pitchZero;
            directionStates.UP = 0;
            directionStates.DOWN = 0;

            if (relativePitch > CONFIG.pitchDeadzone) {
                directionStates.DOWN = 1;
            } else if (relativePitch < -CONFIG.pitchDeadzone) {
                directionStates.UP = 1;
            }

            // 2. JOBBRA-BALRA DIGITÁLIS JEL FELDOLGOZÁSA
            directionStates.LEFT = 0;
            directionStates.RIGHT = 0;

            if (virtualSteering > CONFIG.steeringThreshold) {
                directionStates.RIGHT = 1;
            } else if (virtualSteering < -CONFIG.steeringThreshold) {
                directionStates.LEFT = 1;
            }

            // 3. UI FRISSÍTÉSE
            updateVisualArrows();

            telemetryEl.innerHTML = `
                Dőlés (Fel/Le): ${relativePitch.toFixed(1)}° (${directionStates.UP ? 'FEL' : directionStates.DOWN ? 'LE' : '0'})<br>
                Gyorsulás Y: ${currentAccelY.toFixed(2)} m/s²<br>
                Kormány-integrál: ${virtualSteering.toFixed(2)} (${directionStates.LEFT ? 'BAL' : directionStates.RIGHT ? 'JOBB' : '0'})<br>
                Rekordok száma: ${telemetryData.length}
            `;

            // 4. ADATRÖGZÍTÉS MEMÓRIÁBA
            telemetryData.push({
                timestamp: Date.now(),
                pitch: relativePitch.toFixed(2),
                accelY: currentAccelY.toFixed(2),
                steering: virtualSteering.toFixed(2),
                dir_UP: directionStates.UP,
                dir_DOWN: directionStates.DOWN,
                dir_LEFT: directionStates.LEFT,
                dir_RIGHT: directionStates.RIGHT,
                btn_G1: buttonStates.G1,
                btn_G2: buttonStates.G2,
                btn_G3: buttonStates.G3,
                btn_G4: buttonStates.G4
            });
        }

        // 8-irányú vizuális nyilak vezérlése
        function updateVisualArrows() {
            document.querySelectorAll('.arrow').forEach(el => el.classList.remove('active'));

            const u = directionStates.UP;
            const d = directionStates.DOWN;
            const l = directionStates.LEFT;
            const r = directionStates.RIGHT;

            if (u && !l && !r) document.getElementById('dir-n').classList.add('active');
            if (d && !l && !r) document.getElementById('dir-s').classList.add('active');
            if (l && !u && !d) document.getElementById('dir-w').classList.add('active');
            if (r && !u && !d) document.getElementById('dir-e').classList.add('active');
            
            if (u && r) document.getElementById('dir-ne').classList.add('active');
            if (u && l) document.getElementById('dir-nw').classList.add('active');
            if (d && r) document.getElementById('dir-se').classList.add('active');
            if (d && l) document.getElementById('dir-sw').classList.add('active');
        }

        // CSV Fájl generálása és letöltése
        saveBtn.addEventListener('click', () => {
            if (telemetryData.length === 0) {
                alert("Nincs még rögzített adat!");
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Idobelyeg,Doles_Pitch,Gyorsulas_Y,Kormany_Integral,FEL,LE,BAL,JOBB,Gomb_G1,Gomb_G2,Gomb_G3,Gomb_G4\n";

            telemetryData.forEach(row => {
                let line = `${row.timestamp},${row.pitch},${row.accelY},${row.steering},${row.dir_UP},${row.dir_DOWN},${row.dir_LEFT},${row.dir_RIGHT},${row.btn_G1},${row.btn_G2},${row.btn_G3},${row.btn_G4}`;
                csvContent += line + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `szenzor_teszt_adatok_${Date.now()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
<!-- === HARMADIK RÉSZ VÉGE === -->
