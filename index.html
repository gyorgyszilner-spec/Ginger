<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fektetett Szenzoros Gamepad v3 - NYERS ADAT</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212;
            font-family: sans-serif;
            color: white;
        }

        #gamepad-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .action-btn {
            position: absolute;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.12);
            border: 2px solid rgba(255, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.8rem;
            color: white;
            text-align: center;
            z-index: 10;
            line-height: 1.1;
        }
        .action-btn span {
            font-size: 0.65rem;
            opacity: 0.7;
            font-weight: normal;
        }

        #btn-tl { top: 15px; left: 15px; border-color: #ffb74d; }
        #btn-tr { top: 15px; right: 15px; border-color: #4caf50; }
        #btn-bl { bottom: 15px; left: 15px; border-color: #29b6f6; }
        #btn-br { bottom: 15px; right: 15px; border-color: #ec407a; }

        .action-btn.active {
            background-color: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }
        #btn-tr.running { background-color: rgba(76, 175, 80, 0.4); }

        #center-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            width: 100%;
            max-width: 640px;
            z-index: 5;
        }

        #telemetry {
            font-family: monospace;
            font-size: 0.62rem;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 5px;
            width: 300px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
            line-height: 1.5;
        }
        #telemetry b { color: #ffca28; }
        #record-count {
            font-size: 0.75rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="gamepad-container">
        <div class="action-btn" id="btn-tl">G1<br><span>KALIBRÁL</span></div>
        <div class="action-btn" id="btn-tr">G2<br><span>INDÍTÁS</span></div>
        <div class="action-btn" id="btn-bl">G3<br><span>CSV MENTÉS</span></div>
        <div class="action-btn" id="btn-br">G4<br><span>AKCIÓ</span></div>

        <div id="center-panel">
            <div id="telemetry">Szenzorok: Inaktív</div>
            <div id="record-count">Rekordok: 0</div>
        </div>
    </div>

    <script>
        // === NYERS SZENZOR NAPLÓZÓ ===
        // Ez a verzió NEM próbál semmit értelmezni (nincs pitch/kormány logika),
        // csak MINDEN elérhető szenzorértéket kimásol minden tick-ben, hogy utólag
        // logikázhassuk ki, melyik oszlop mit jelent.

        let telemetryData = [];
        let isRunning = false;
        let recordIntervalId = null;
        let guideStarted = false;

        let buttonStates = { G1: 0, G2: 0, G3: 0, G4: 0 };

        // Legutóbb kapott nyers szenzorértékek (ezeket írjuk ki minden tick-ben)
        let raw = {
            ori_alpha: null, ori_beta: null, ori_gamma: null, ori_absolute: null,
            acc_x: null, acc_y: null, acc_z: null,
            accG_x: null, accG_y: null, accG_z: null,
            rot_alpha: null, rot_beta: null, rot_gamma: null,
            motion_interval: null
        };

        const telemetryEl = document.getElementById('telemetry');
        const recordCountEl = document.getElementById('record-count');
        const btnTR = document.getElementById('btn-tr');

        const setupButton = (elementId, key, callbackPress) => {
            const btn = document.getElementById(elementId);

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                btn.classList.add('active');
                buttonStates[key] = 1;

                // Ha a hangos vezetés éppen "bármelyik gombot" vár, a szenzorindítást
                // KÖZVETLENÜL itt, a touchstart eseményen belül hívjuk meg (iOS user-gesture!)
                if (guideWaitingForAny) {
                    startSensors();
                }

                notifyButtonPress(key);
                if (key !== 'G3' && callbackPress) callbackPress();
            }, {passive: false});

            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                btn.classList.remove('active');
                buttonStates[key] = 0;
                if (key === 'G3' && callbackPress) callbackPress();
            }, {passive: false});
        };

        setupButton('btn-tl', 'G1', null);
        setupButton('btn-tr', 'G2', () => { startSensors(); });
        setupButton('btn-bl', 'G3', () => { saveCSVData(); });
        setupButton('btn-br', 'G4', null);

        window.addEventListener('load', () => {
            if (!guideStarted) {
                guideStarted = true;
                runGuidedSequence();
            }
        });

        async function startSensors() {
            if (isRunning) return;

            try {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const orientationPerm = await DeviceOrientationEvent.requestPermission();
                    if (orientationPerm !== 'granted') {
                        alert("Szenzor hozzáférés elutasítva (dőlés)!");
                        return;
                    }
                }
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    const motionPerm = await DeviceMotionEvent.requestPermission();
                    if (motionPerm !== 'granted') {
                        alert("Szenzor hozzáférés elutasítva (gyorsulás)!");
                        return;
                    }
                }

                window.addEventListener('deviceorientation', handleOrientation);
                window.addEventListener('devicemotion', handleMotion);

                isRunning = true;
                btnTR.classList.add('running');
                btnTR.innerHTML = "G2<br><span>FUT...</span>";

                recordIntervalId = setInterval(recordDataTick, 20);

            } catch (err) {
                alert("Szenzor hiba: " + err);
            }
        }

        function handleOrientation(event) {
            raw.ori_alpha = event.alpha;
            raw.ori_beta = event.beta;
            raw.ori_gamma = event.gamma;
            raw.ori_absolute = event.absolute;
        }

        function handleMotion(event) {
            if (event.acceleration) {
                raw.acc_x = event.acceleration.x;
                raw.acc_y = event.acceleration.y;
                raw.acc_z = event.acceleration.z;
            }
            if (event.accelerationIncludingGravity) {
                raw.accG_x = event.accelerationIncludingGravity.x;
                raw.accG_y = event.accelerationIncludingGravity.y;
                raw.accG_z = event.accelerationIncludingGravity.z;
            }
            if (event.rotationRate) {
                raw.rot_alpha = event.rotationRate.alpha;
                raw.rot_beta = event.rotationRate.beta;
                raw.rot_gamma = event.rotationRate.gamma;
            }
            raw.motion_interval = event.interval;
        }

        function fmt(v, d) {
            if (v === null || v === undefined || isNaN(v)) return '--';
            return v.toFixed(d === undefined ? 1 : d);
        }

        function recordDataTick() {
            if (!isRunning) return;

            telemetryEl.innerHTML = `
                Szenzorok: <b>FUT</b><br>
                --- deviceorientation ---<br>
                alpha: ${fmt(raw.ori_alpha)}&deg;  beta: ${fmt(raw.ori_beta)}&deg;  gamma: ${fmt(raw.ori_gamma)}&deg;<br>
                --- acceleration (gravity nélkül) ---<br>
                x: ${fmt(raw.acc_x, 2)}  y: ${fmt(raw.acc_y, 2)}  z: ${fmt(raw.acc_z, 2)} m/s&sup2;<br>
                --- accelerationIncludingGravity ---<br>
                x: ${fmt(raw.accG_x, 2)}  y: ${fmt(raw.accG_y, 2)}  z: ${fmt(raw.accG_z, 2)} m/s&sup2;<br>
                --- rotationRate ---<br>
                alpha: ${fmt(raw.rot_alpha)}  beta: ${fmt(raw.rot_beta)}  gamma: ${fmt(raw.rot_gamma)} &deg;/s<br>
                motion interval: ${fmt(raw.motion_interval, 1)} ms
            `;
            recordCountEl.textContent = `Rekordok: ${telemetryData.length}`;

            telemetryData.push({
                timestamp: Date.now(),
                ori_alpha: raw.ori_alpha, ori_beta: raw.ori_beta, ori_gamma: raw.ori_gamma, ori_absolute: raw.ori_absolute,
                acc_x: raw.acc_x, acc_y: raw.acc_y, acc_z: raw.acc_z,
                accG_x: raw.accG_x, accG_y: raw.accG_y, accG_z: raw.accG_z,
                rot_alpha: raw.rot_alpha, rot_beta: raw.rot_beta, rot_gamma: raw.rot_gamma,
                motion_interval: raw.motion_interval,
                btn_G1: buttonStates.G1,
                btn_G2: buttonStates.G2,
                btn_G3: buttonStates.G3,
                btn_G4: buttonStates.G4
            });
        }

        function csvVal(v) {
            return (v === null || v === undefined) ? '' : v;
        }

        function saveCSVData() {
            if (telemetryData.length === 0) {
                alert("Nincs menthető adat! Indítsd el a mérést a G2 gombbal.");
                return;
            }

            const recordCount = telemetryData.length;

            let csvRows = [];
            csvRows.push("Idobelyeg,Ori_Alpha,Ori_Beta,Ori_Gamma,Ori_Absolute,Acc_X,Acc_Y,Acc_Z,AccG_X,AccG_Y,AccG_Z,Rot_Alpha,Rot_Beta,Rot_Gamma,Motion_Interval,G1_Kalib,G2_Start,G3_Save,G4_Action");

            telemetryData.forEach(row => {
                csvRows.push([
                    row.timestamp,
                    csvVal(row.ori_alpha), csvVal(row.ori_beta), csvVal(row.ori_gamma), csvVal(row.ori_absolute),
                    csvVal(row.acc_x), csvVal(row.acc_y), csvVal(row.acc_z),
                    csvVal(row.accG_x), csvVal(row.accG_y), csvVal(row.accG_z),
                    csvVal(row.rot_alpha), csvVal(row.rot_beta), csvVal(row.rot_gamma),
                    csvVal(row.motion_interval),
                    row.btn_G1, row.btn_G2, row.btn_G3, row.btn_G4
                ].join(','));
            });

            const csvString = csvRows.join("\n");
            const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });

            const link = document.createElement("a");
            if (window.navigator && window.navigator.msSaveOrOpenBlob) {
                window.navigator.msSaveOrOpenBlob(blob, `nyers_szenzor_adatok_${Date.now()}.csv`);
                alert(`Mentve: ${recordCount} rekord.`);
            } else {
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.setAttribute("download", `nyers_szenzor_adatok_${Date.now()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(() => URL.revokeObjectURL(url), 100);
                alert(`Mentve: ${recordCount} rekord. Ha nem jelent meg letöltés, nézd meg a Letöltések mappát vagy a böngésző letöltés-sávját.`);
            }
        }

        // === HANGOS VEZETÉS ===
        let guideResolveButton = null;
        let guideWaitingForAny = false;
        let guideWaitingForKey = null;

        function speak(text) {
            return new Promise((resolve) => {
                if (!('speechSynthesis' in window)) { resolve(); return; }
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'hu-HU';
                utter.rate = 1;
                utter.onend = resolve;
                utter.onerror = resolve;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utter);
            });
        }

        function wait(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function waitForButton(key) {
            return new Promise((resolve) => {
                if (key === 'any') {
                    guideWaitingForAny = true;
                    guideWaitingForKey = null;
                } else {
                    guideWaitingForAny = false;
                    guideWaitingForKey = key;
                }
                guideResolveButton = () => {
                    guideWaitingForAny = false;
                    guideWaitingForKey = null;
                    guideResolveButton = null;
                    resolve();
                };
            });
        }

        function notifyButtonPress(key) {
            if (guideResolveButton && (guideWaitingForAny || guideWaitingForKey === key)) {
                guideResolveButton();
            }
        }

        async function runGuidedSequence() {
            await speak("Állj fel, legyen körülötted legalább egy méter szabad hely. Ha készen állsz, nyomj meg bármelyik gombot.");
            await waitForButton('any');

            await speak("Tartsd a telefont egyenesen magad előtt, majd nyomd meg a kalibráló gombot.");
            await waitForButton('G1');

            await wait(500);
            await speak("Teszt mentés.");
            saveCSVData();
            await wait(1000);

            await speak("Dőlj hátra a telefonnal.");
            await wait(3000);

            await speak("Állj egyenesen.");
            await wait(2000);

            await speak("Dőlj előre a telefonnal.");
            await wait(3000);

            await speak("Állj egyenesen.");
            await wait(2000);

            await speak("Fordulj balra, és ott állj meg.");
            await wait(3000);

            await speak("Fordulj vissza középre.");
            await wait(2000);

            await speak("Fordulj jobbra, és ott állj meg.");
            await wait(3000);

            await speak("Fordulj vissza középre.");
            await wait(2000);

            await speak("Dőlj hátra a telefonnal.");
            await wait(3000);

            await speak("Most kezdj el körözni.");
            await wait(6000);

            await speak("Állj meg. Nyomd meg a CSV mentés gombot a napló elmentéséhez.");
        }
    </script>
</body>
</html>
