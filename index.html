<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fektetett Szenzoros Gamepad v7 - PLAUZIBILITAS-SZURO</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212;
            font-family: sans-serif;
            color: white;
        }

        #gamepad-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .action-btn {
            position: absolute;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.12);
            border: 2px solid rgba(255, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.8rem;
            color: white;
            text-align: center;
            z-index: 10;
            line-height: 1.1;
        }
        .action-btn span {
            font-size: 0.65rem;
            opacity: 0.7;
            font-weight: normal;
        }

        #btn-tl { top: 15px; left: 15px; border-color: #ffb74d; }
        #btn-tr { top: 15px; right: 15px; border-color: #4caf50; }
        #btn-bl { bottom: 15px; left: 15px; border-color: #29b6f6; }
        #btn-br { bottom: 15px; right: 15px; border-color: #ec407a; }

        .action-btn.active {
            background-color: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }
        #btn-tr.running { background-color: rgba(76, 175, 80, 0.4); }

        #center-panel {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 640px;
            z-index: 5;
        }

        #telemetry {
            font-family: monospace;
            font-size: 0.62rem;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 5px;
            width: 250px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
            line-height: 1.5;
        }
        #telemetry b { color: #ffca28; }

        .compass-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 8px;
            width: 150px;
            height: 150px;
            flex-shrink: 0;
        }
        .arrow {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.2);
        }
        .arrow.active {
            background-color: #00e676;
            color: #121212;
            font-weight: bold;
            box-shadow: 0 0 12px #00e676;
        }
        #dir-c {
            background-color: rgba(255,255,255,0.02);
            font-size: 0.75rem;
        }
        #dir-c.active {
            background-color: #2196f3;
            color: white;
            box-shadow: 0 0 12px #2196f3;
        }
        #version-badge {
            position: fixed;
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
            font-family: monospace;
            font-size: 0.7rem;
            color: #ffca28;
            background: rgba(0,0,0,0.5);
            padding: 2px 10px;
            border-radius: 4px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="version-badge">v7 - PLAUZIBILITAS-SZURO</div>
    <div id="gamepad-container">
        <div class="action-btn" id="btn-tl">G1<br><span>KALIBRÁL</span></div>
        <div class="action-btn" id="btn-tr">G2<br><span>INDÍTÁS</span></div>
        <div class="action-btn" id="btn-bl">G3<br><span>CSV MENTÉS</span></div>
        <div class="action-btn" id="btn-br">G4<br><span>AKCIÓ</span></div>

        <div id="center-panel">
            <div id="telemetry">Szenzorok: Inaktív</div>
            <div class="compass-grid">
                <div class="arrow" id="dir-nw">↖</div>
                <div class="arrow" id="dir-n">↑</div>
                <div class="arrow" id="dir-ne">↗</div>
                <div class="arrow" id="dir-w">←</div>
                <div class="arrow" id="dir-c">KÖZÉP</div>
                <div class="arrow" id="dir-e">→</div>
                <div class="arrow" id="dir-sw">↙</div>
                <div class="arrow" id="dir-s">↓</div>
                <div class="arrow" id="dir-se">↘</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // BEÁLLÍTÁSOK (a nyers-adat felvételek alapján kalibrálva)
        // ============================================================
        // ============================================================
        // VERZIÓSZÁM - EZT NÖVELD MINDEN MÓDOSÍTÁSNÁL!
        // A telefonon a képernyő tetején látszó jelzésből ellenőrizhető,
        // hogy a legfrissebb verzió töltődött-e be (cache-probléma esetén nem).
        // ============================================================
        const APP_VERSION = "v7 - PLAUZIBILITAS-SZURO";
        document.getElementById('version-badge').textContent = APP_VERSION;
        document.title = "Fektetett Szenzoros Gamepad " + APP_VERSION;
        console.log("Betöltve:", APP_VERSION);
        document.getElementById('telemetry').textContent = "Szenzorok: Inaktív (" + APP_VERSION + ")";

        const CONFIG = {
            // --- DŐLÉS (FEL/LE) tengely: AccG_Z alapján ---
            // Mért nyugalmi zaj std ~0.11, valós kilengés -5.3..+8.4 m/s^2
            TILT_ENTER: 2.5,      // ide kell dőlni, hogy FEL/LE aktiválódjon
            TILT_EXIT: 1.0,       // ide kell visszatérni KÖZÉP-hez

            // --- FORDULÁS (BAL/JOBB) tengely: giroszkóp-integrált relatív yaw ---
            // Mért: BALRA ~+92 fok, JOBBRA ~-84 fok giro-integrállal
            TURN_ENTER: 30,       // ide kell fordulni, hogy BAL/JOBB aktiválódjon (stabil be)
            TURN_EXIT: 12,        // ide kell visszafordulni, hogy KÖZÉP legyen (stabil ki)

            // Fizikai valószerűség-küszöb: körözés nélkül sosem fordulunk el ennél
            // többet a kalibrált középponthoz képest. Ha a kompasz ennél nagyobb
            // elmozdulást "mondana", az garantáltan a flip-hiba (~180 fok), nem
            // valós mozgás - egyszerűen eldobjuk, nem engedjük korrigálni a yawRel-t.
            PLAUSIBLE_MAX_DELTA: 100,

            // --- "Megállás" (settle) detektálás a fordulás tengelyhez ---
            // A user specifikáció szerint a stabil bal/jobb csak MEGÁLLÁS UTÁN aktiválódik,
            // különben menet közben minden fokon átbillenne az állapot.
            SETTLE_ROT_DEG_S: 8,  // ez alatti szögsebesség számít "megállt"-nak
            SETTLE_MS: 150,       // ennyi ideig kell megállva maradni a váltáshoz

            // --- Kompasz-korrekció a giroszkóp-drift ellen ---
            // A kompasz (Ori_Alpha) csak akkor megbízható, ha nem vagyunk nagy dőlésben
            // ÉS nem "flipped" (lásd Ori_Beta) ÉS a forgás épp nyugodt - lásd handleMotion.
            COMPASS_SAFE_TILT: 2.0     // |deltaZ| ez alatt bízunk a kompaszban
        };

        // ============================================================
        // ÁLLAPOT
        // ============================================================
        let telemetryData = [];
        let isRunning = false;
        let recordIntervalId = null;
        let guideStarted = false;

        let buttonStates = { G1: 0, G2: 0, G3: 0, G4: 0 };

        // Nyers szenzorértékek
        let raw = {
            ori_alpha: null, ori_beta: null, ori_gamma: null,
            acc_x: null, acc_y: null, acc_z: null,
            accG_x: null, accG_y: null, accG_z: null,
            rot_alpha: null, rot_beta: null, rot_gamma: null,
            motion_interval: null
        };

        // Kalibráció
        let isCalibrated = false;
        let calibAlpha = 0;
        let baselineAccGZ = 0;

        // Számolt, folytonos yaw (giroszkóp-integrált, kompasszal korrigálva)
        let yawRel = 0;
        let lastMotionTime = null;

        // Tengelyenkénti állapotgépek
        let tiltState = 'KOZEP';   // 'KOZEP' | 'FEL' | 'LE'
        let turnState = 'KOZEP';   // 'KOZEP' | 'BAL' | 'JOBB'
        let turnCandidate = 'KOZEP';
        let settleTimer = 0;
        let lastTickTime = null;

        const telemetryEl = document.getElementById('telemetry');
        const btnTR = document.getElementById('btn-tr');

        // ============================================================
        // GOMBOK
        // ============================================================
        const setupButton = (elementId, key, callbackPress) => {
            const btn = document.getElementById(elementId);

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                btn.classList.add('active');
                buttonStates[key] = 1;

                if (guideWaitingForAny) {
                    startSensors();
                }

                notifyButtonPress(key);
                if (key !== 'G3' && callbackPress) callbackPress();
            }, {passive: false});

            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                btn.classList.remove('active');
                buttonStates[key] = 0;
                if (key === 'G3' && callbackPress) callbackPress();
            }, {passive: false});
        };

        setupButton('btn-tl', 'G1', () => { calibrate(); });
        setupButton('btn-tr', 'G2', () => { startSensors(); });
        setupButton('btn-bl', 'G3', () => { saveCSVData(); });
        setupButton('btn-br', 'G4', null);

        window.addEventListener('load', () => {
            if (!guideStarted) {
                guideStarted = true;
                runGuidedSequence();
            }
        });

        // Rövid gördülő puffer a nyers alpha/beta/accG_Z értékekhez.
        // CÉL: se a kalibráció, se a "flipped" detektálás ne egyetlen pillanatnyi,
        // esetlegesen zajos mintára épüljön - inkább az utolsó néhány minta
        // MEDIÁNJÁRA/átlagára, ami kiszűri az egyszeri zajtüskéket.
        const HISTORY_LEN = 7;
        let historyAlpha = [];
        let historyBeta = [];
        let historyAccGZ = [];

        function median(arr) {
            if (arr.length === 0) return 0;
            const sorted = [...arr].sort((a,b) => a-b);
            return sorted[Math.floor(sorted.length/2)];
        }

        function pushHistory() {
            if (raw.ori_alpha !== null) {
                historyAlpha.push(raw.ori_alpha);
                if (historyAlpha.length > HISTORY_LEN) historyAlpha.shift();
            }
            if (raw.ori_beta !== null) {
                historyBeta.push(raw.ori_beta);
                if (historyBeta.length > HISTORY_LEN) historyBeta.shift();
            }
            if (raw.accG_z !== null) {
                historyAccGZ.push(raw.accG_z);
                if (historyAccGZ.length > HISTORY_LEN) historyAccGZ.shift();
            }
        }

        // Szűrt "vagyunk-e a flipped ágon" döntés: a legutóbbi minták MEDIÁNJÁRA
        // épül, nem egyetlen pillanatnyi mintára - egy magányos zajtüske így nem
        // tud téves flip-detektálást (vagy annak elmulasztását) okozni.
        function isFlippedFiltered() {
            return Math.abs(median(historyBeta)) > 150;
        }

        function calibrate() {
            // Szűrt kalibráció: az utolsó néhány (max HISTORY_LEN) mintából
            // csak a NEM flipped mintákat vesszük figyelembe, és azok mediánját
            // használjuk referenciának - nem egyetlen, esetlegesen zajos leolvasást.
            const goodAlphas = [];
            const goodAccGZ = [];
            for (let i = 0; i < historyBeta.length; i++) {
                if (Math.abs(historyBeta[i]) <= 150) {
                    if (historyAlpha[i] !== undefined) goodAlphas.push(historyAlpha[i]);
                    if (historyAccGZ[i] !== undefined) goodAccGZ.push(historyAccGZ[i]);
                }
            }

            let a;
            if (goodAlphas.length > 0) {
                a = median(goodAlphas);
            } else {
                // Az összes puffer-minta flipped volt (pl. épp villódzás közepén
                // nyomtuk meg a gombot) - normalizáljuk vissza a normál ágra.
                a = ((raw.ori_alpha || 0) + 180) % 360;
            }

            calibAlpha = a;
            baselineAccGZ = goodAccGZ.length > 0 ? median(goodAccGZ) : (raw.accG_z || 0);
            yawRel = 0;
            turnState = 'KOZEP';
            turnCandidate = 'KOZEP';
            tiltState = 'KOZEP';
            settleTimer = 0;
            isCalibrated = true;
        }

        // ============================================================
        // SZENZOROK INDÍTÁSA
        // ============================================================
        async function startSensors() {
            if (isRunning) return;

            try {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const orientationPerm = await DeviceOrientationEvent.requestPermission();
                    if (orientationPerm !== 'granted') {
                        alert("Szenzor hozzáférés elutasítva (dőlés)!");
                        return;
                    }
                }
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    const motionPerm = await DeviceMotionEvent.requestPermission();
                    if (motionPerm !== 'granted') {
                        alert("Szenzor hozzáférés elutasítva (gyorsulás)!");
                        return;
                    }
                }

                window.addEventListener('deviceorientation', handleOrientation);
                window.addEventListener('devicemotion', handleMotion);

                isRunning = true;
                btnTR.classList.add('running');
                btnTR.innerHTML = "G2<br><span>FUT...</span>";

                recordIntervalId = setInterval(recordDataTick, 20);

            } catch (err) {
                alert("Szenzor hiba: " + err);
            }
        }

        function handleOrientation(event) {
            raw.ori_alpha = event.alpha;
            raw.ori_beta = event.beta;
            raw.ori_gamma = event.gamma;
            pushHistory();
        }

        function wrap180(deg) {
            let d = deg % 360;
            if (d > 180) d -= 360;
            if (d < -180) d += 360;
            return d;
        }

        function handleMotion(event) {
            if (event.acceleration) {
                raw.acc_x = event.acceleration.x;
                raw.acc_y = event.acceleration.y;
                raw.acc_z = event.acceleration.z;
            }
            if (event.accelerationIncludingGravity) {
                raw.accG_x = event.accelerationIncludingGravity.x;
                raw.accG_y = event.accelerationIncludingGravity.y;
                raw.accG_z = event.accelerationIncludingGravity.z;
            }
            if (event.rotationRate) {
                raw.rot_alpha = event.rotationRate.alpha;
                raw.rot_beta = event.rotationRate.beta;
                raw.rot_gamma = event.rotationRate.gamma;
            }
            raw.motion_interval = event.interval;
            pushHistory();

            // --- Folytonos yaw: giroszkóp-integrálás ---
            // Ez a lépés kerüli meg a kompasz gimbal-lock-os ugrásait, mert nyers
            // szögsebességet integrálunk, nem a levezetett (és instabil) Ori_Alpha-t olvassuk.
            const now = performance.now();
            if (isCalibrated && lastMotionTime !== null && raw.rot_alpha !== null) {
                let dt = (now - lastMotionTime) / 1000;
                if (dt > 0 && dt < 0.5) {
                    yawRel += raw.rot_alpha * dt;

                    // Kompasz-korrekció: CSAK akkor bízunk az Ori_Alpha-ban, ha
                    //  (a) nem vagyunk nagy dőlésben, ÉS
                    //  (b) az Ori_Beta (SZŰRT, mediánból) NINCS a "flipped" ágon, ÉS
                    //  (c) a forgás épp NYUGODT (alacsony Rot_Alpha), ÉS
                    //  (d) a kapott elfordulás FIZIKAILAG ÉSSZERŰ (nem nagyobb, mint
                    //      amit körözés nélkül valaha is elérhetnénk).
                    // A (d) pont a legegyszerűbb és legerősebb védelem: nem kell
                    // kitalálnunk, HOGY ÉS MIÉRT romlott el a kompasz - ha az eredmény
                    // fizikailag képtelen (pl. 178 fokos "fordulat" körözés nélkül),
                    // egyszerűen eldobjuk, és a giroszkóp viszi tovább az értéket.
                    const isCompassFlipped = isFlippedFiltered();
                    const isYawSettled = Math.abs(raw.rot_alpha) < CONFIG.SETTLE_ROT_DEG_S;
                    if (raw.accG_z !== null && raw.ori_alpha !== null && !isCompassFlipped && isYawSettled) {
                        const deltaZ = Math.abs(median(historyAccGZ) - baselineAccGZ);
                        if (deltaZ < CONFIG.COMPASS_SAFE_TILT) {
                            const compassDelta = wrap180(raw.ori_alpha - calibAlpha);
                            if (Math.abs(compassDelta) < CONFIG.PLAUSIBLE_MAX_DELTA) {
                                yawRel = compassDelta;
                            }
                            // else: eldobjuk - a kompasz "hülyeséget" mondott, a giro-
                            // integrál folytatja a maga útját tovább, korrekció nélkül.
                        }
                    }
                }
            }
            lastMotionTime = now;
        }

        // ============================================================
        // ÁLLAPOTGÉPEK (Schmitt-trigger + megállás-detektálás)
        // ============================================================
        function updateTiltState() {
            if (!isCalibrated || historyAccGZ.length === 0) return;
            const deltaZ = median(historyAccGZ) - baselineAccGZ;

            if (tiltState === 'KOZEP') {
                if (deltaZ > CONFIG.TILT_ENTER) tiltState = 'FEL';
                else if (deltaZ < -CONFIG.TILT_ENTER) tiltState = 'LE';
            } else if (tiltState === 'FEL') {
                if (deltaZ < CONFIG.TILT_EXIT) tiltState = 'KOZEP';
            } else if (tiltState === 'LE') {
                if (deltaZ > -CONFIG.TILT_EXIT) tiltState = 'KOZEP';
            }
        }

        function updateTurnState(dtMs) {
            if (!isCalibrated || raw.rot_alpha === null) return;

            // 1. Kiszámoljuk, mi lenne az állapot a jelenlegi yawRel alapján (hiszterézissel)
            if (turnState === 'KOZEP') {
                if (yawRel > CONFIG.TURN_ENTER) turnCandidate = 'BAL';
                else if (yawRel < -CONFIG.TURN_ENTER) turnCandidate = 'JOBB';
                else turnCandidate = 'KOZEP';
            } else if (turnState === 'BAL') {
                turnCandidate = (yawRel < CONFIG.TURN_EXIT) ? 'KOZEP' : 'BAL';
            } else if (turnState === 'JOBB') {
                turnCandidate = (yawRel > -CONFIG.TURN_EXIT) ? 'KOZEP' : 'JOBB';
            }

            // 2. "Megállás" detektálás: csak akkor engedjük érvényesülni a váltást,
            // ha a forgási sebesség egy ideje alacsony (ez a "utáni megállás" feltétel).
            if (Math.abs(raw.rot_alpha) < CONFIG.SETTLE_ROT_DEG_S) {
                settleTimer += dtMs;
            } else {
                settleTimer = 0;
            }

            if (turnCandidate !== turnState && settleTimer >= CONFIG.SETTLE_MS) {
                turnState = turnCandidate;
            }
        }

        function combinedStateId() {
            // 9 állapot: KOZEP + 4 irany + 4 atlo
            if (tiltState === 'KOZEP' && turnState === 'KOZEP') return 'KOZEP';
            if (tiltState === 'FEL' && turnState === 'KOZEP') return 'FEL';
            if (tiltState === 'LE' && turnState === 'KOZEP') return 'LE';
            if (tiltState === 'KOZEP' && turnState === 'BAL') return 'BAL';
            if (tiltState === 'KOZEP' && turnState === 'JOBB') return 'JOBB';
            if (tiltState === 'FEL' && turnState === 'BAL') return 'FEL_BAL';
            if (tiltState === 'FEL' && turnState === 'JOBB') return 'FEL_JOBB';
            if (tiltState === 'LE' && turnState === 'BAL') return 'LE_BAL';
            if (tiltState === 'LE' && turnState === 'JOBB') return 'LE_JOBB';
        }

        function updateVisualArrows(stateId) {
            document.querySelectorAll('.arrow').forEach(el => el.classList.remove('active'));
            const map = {
                'KOZEP': 'dir-c', 'FEL': 'dir-n', 'LE': 'dir-s',
                'BAL': 'dir-w', 'JOBB': 'dir-e',
                'FEL_BAL': 'dir-nw', 'FEL_JOBB': 'dir-ne',
                'LE_BAL': 'dir-sw', 'LE_JOBB': 'dir-se'
            };
            const id = map[stateId];
            if (id) document.getElementById(id).classList.add('active');
        }

        function fmt(v, d) {
            if (v === null || v === undefined || isNaN(v)) return '--';
            return v.toFixed(d === undefined ? 1 : d);
        }

        // ============================================================
        // FŐ CIKLUS
        // ============================================================
        function recordDataTick() {
            if (!isRunning) return;

            const now = performance.now();
            const dtMs = lastTickTime !== null ? (now - lastTickTime) : 20;
            lastTickTime = now;

            updateTiltState();
            updateTurnState(dtMs);
            const stateId = combinedStateId();
            updateVisualArrows(stateId);

            telemetryEl.innerHTML = `
                Szenzorok: <b>FUT</b>  Rekordok: ${telemetryData.length}<br>
                Kalibrálva: ${isCalibrated ? 'igen' : '<b>nem</b>'}<br>
                --- nyers ---<br>
                alpha: ${fmt(raw.ori_alpha)}&deg;  AccG_Z: ${fmt(raw.accG_z,2)}<br>
                Rot_Alpha: ${fmt(raw.rot_alpha)}&deg;/s<br>
                --- számolt ---<br>
                yawRel: <b>${fmt(yawRel)}</b>&deg;<br>
                Dőlés állapot: <b>${tiltState}</b><br>
                Fordulás állapot: <b>${turnState}</b><br>
                Kombinált: <b>${stateId}</b>
            `;

            telemetryData.push({
                timestamp: Date.now(),
                ori_alpha: raw.ori_alpha, ori_beta: raw.ori_beta, ori_gamma: raw.ori_gamma,
                acc_x: raw.acc_x, acc_y: raw.acc_y, acc_z: raw.acc_z,
                accG_x: raw.accG_x, accG_y: raw.accG_y, accG_z: raw.accG_z,
                rot_alpha: raw.rot_alpha, rot_beta: raw.rot_beta, rot_gamma: raw.rot_gamma,
                motion_interval: raw.motion_interval,
                yaw_rel: yawRel,
                tilt_state: tiltState,
                turn_state: turnState,
                combined_state: stateId,
                btn_G1: buttonStates.G1,
                btn_G2: buttonStates.G2,
                btn_G3: buttonStates.G3,
                btn_G4: buttonStates.G4
            });
        }

        function csvVal(v) {
            return (v === null || v === undefined) ? '' : v;
        }

        function saveCSVData() {
            if (telemetryData.length === 0) {
                alert("Nincs menthető adat! Indítsd el a mérést a G2 gombbal.");
                return;
            }

            const recordCount = telemetryData.length;

            let csvRows = [];
            csvRows.push("Idobelyeg,Ori_Alpha,Ori_Beta,Ori_Gamma,Acc_X,Acc_Y,Acc_Z,AccG_X,AccG_Y,AccG_Z,Rot_Alpha,Rot_Beta,Rot_Gamma,Motion_Interval,Yaw_Rel,Tilt_State,Turn_State,Combined_State,G1_Kalib,G2_Start,G3_Save,G4_Action");

            telemetryData.forEach(row => {
                csvRows.push([
                    row.timestamp,
                    csvVal(row.ori_alpha), csvVal(row.ori_beta), csvVal(row.ori_gamma),
                    csvVal(row.acc_x), csvVal(row.acc_y), csvVal(row.acc_z),
                    csvVal(row.accG_x), csvVal(row.accG_y), csvVal(row.accG_z),
                    csvVal(row.rot_alpha), csvVal(row.rot_beta), csvVal(row.rot_gamma),
                    csvVal(row.motion_interval),
                    csvVal(row.yaw_rel && row.yaw_rel.toFixed ? row.yaw_rel.toFixed(2) : row.yaw_rel),
                    row.tilt_state, row.turn_state, row.combined_state,
                    row.btn_G1, row.btn_G2, row.btn_G3, row.btn_G4
                ].join(','));
            });

            const csvString = csvRows.join("\n");
            const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });

            const link = document.createElement("a");
            if (window.navigator && window.navigator.msSaveOrOpenBlob) {
                window.navigator.msSaveOrOpenBlob(blob, `allapotgep_adatok_${Date.now()}.csv`);
                alert(`Mentve: ${recordCount} rekord.`);
            } else {
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.setAttribute("download", `allapotgep_adatok_${Date.now()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(() => URL.revokeObjectURL(url), 100);
                alert(`Mentve: ${recordCount} rekord. Ha nem jelent meg letöltés, nézd meg a Letöltések mappát vagy a böngésző letöltés-sávját.`);
            }
        }

        // ============================================================
        // HANGOS VEZETÉS
        // ============================================================
        let guideResolveButton = null;
        let guideWaitingForAny = false;
        let guideWaitingForKey = null;

        function speak(text) {
            return new Promise((resolve) => {
                if (!('speechSynthesis' in window)) { resolve(); return; }
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'hu-HU';
                utter.rate = 1;
                utter.onend = resolve;
                utter.onerror = resolve;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utter);
            });
        }

        function wait(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function waitForButton(key) {
            return new Promise((resolve) => {
                if (key === 'any') {
                    guideWaitingForAny = true;
                    guideWaitingForKey = null;
                } else {
                    guideWaitingForAny = false;
                    guideWaitingForKey = key;
                }
                guideResolveButton = () => {
                    guideWaitingForAny = false;
                    guideWaitingForKey = null;
                    guideResolveButton = null;
                    resolve();
                };
            });
        }

        function notifyButtonPress(key) {
            if (guideResolveButton && (guideWaitingForAny || guideWaitingForKey === key)) {
                guideResolveButton();
            }
        }

        async function runGuidedSequence() {
            await speak("Állj fel, legyen körülötted legalább egy méter szabad hely. Ha készen állsz, nyomj meg bármelyik gombot.");
            await waitForButton('any');

            await speak("Tartsd a telefont egyenesen magad előtt, majd nyomd meg a kalibráló gombot.");
            await waitForButton('G1');

            await wait(500);
            await speak("Teszt mentés.");
            saveCSVData();
            await wait(1000);

            await speak("Dőlj hátra a telefonnal.");
            await wait(3000);

            await speak("Állj egyenesen.");
            await wait(2000);

            await speak("Dőlj előre a telefonnal.");
            await wait(3000);

            await speak("Állj egyenesen.");
            await wait(2000);

            await speak("Fordulj balra, és ott állj meg.");
            await wait(3000);

            await speak("Fordulj vissza középre.");
            await wait(2000);

            await speak("Fordulj jobbra, és ott állj meg.");
            await wait(3000);

            await speak("Fordulj vissza középre.");
            await wait(2000);

            await speak("Most fordulj balra, és közben dőlj hátra is - ez az átlós állapot tesztje.");
            await wait(4000);

            await speak("Állj vissza középre.");
            await wait(2000);

            await speak("Dőlj hátra a telefonnal.");
            await wait(3000);

            await speak("Most kezdj el körözni.");
            await wait(6000);

            await speak("Állj meg. Nyomd meg a CSV mentés gombot a napló elmentéséhez.");
        }
    </script>
