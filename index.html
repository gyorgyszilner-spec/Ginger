<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mozgásvezérelt sávváltós sportkocsi</title>
<style>
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background-color: #050208; font-family: sans-serif; color: white; }

    .screen { width: 100%; height: 100%; }
    .hidden { display: none !important; }

    /* ---- 1. képernyő: kalibrációs vezérlő ---- */
    #screen-calib { position: relative; background-color: #121212; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #gamepad-container { position: relative; width: 100%; max-width: 640px; height: 280px; display: flex; justify-content: center; align-items: center; }
    .action-btn {
        position: absolute; width: 75px; height: 75px; border-radius: 50%;
        background-color: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.4);
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        font-weight: bold; font-size: 0.8rem; color: white; text-align: center; z-index: 10; line-height: 1.1;
    }
    .action-btn span { font-size: 0.65rem; opacity: 0.7; font-weight: normal; }
    #btn-tl { top: 15px; left: 15px; border-color: #ffb74d; }
    #btn-tr { top: 15px; right: 15px; border-color: #4caf50; }
    #btn-br { bottom: 15px; right: 15px; border-color: #ec407a; }
    .action-btn.active { background-color: rgba(255,255,255,0.3); transform: scale(0.95); }
    #btn-tr.running { background-color: rgba(76,175,80,0.4); }

    #center-panel { display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 20px; width: 100%; max-width: 640px; z-index: 5; }
    #telemetry { font-family: monospace; font-size: 0.62rem; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 5px; width: 250px; text-align: left; border: 1px solid rgba(255,255,255,0.1); line-height: 1.5; }
    #telemetry b { color: #ffca28; }

    .compass-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 8px; width: 150px; height: 150px; flex-shrink: 0; }
    .arrow { display: flex; justify-content: center; align-items: center; background-color: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; font-size: 1.2rem; color: rgba(255,255,255,0.2); }
    .arrow.active { background-color: #00e676; color: #121212; font-weight: bold; box-shadow: 0 0 12px #00e676; }
    #dir-n { grid-column: 2; grid-row: 1; }
    #dir-w { grid-column: 1; grid-row: 2; }
    #dir-c { grid-column: 2; grid-row: 2; background-color: rgba(255,255,255,0.02); font-size: 0.75rem; }
    #dir-e { grid-column: 3; grid-row: 2; }
    #dir-s { grid-column: 2; grid-row: 3; }
    #dir-c.active { background-color: #2196f3; color: white; box-shadow: 0 0 12px #2196f3; }

    #startGameBtn {
        display: none; margin-top: 26px; padding: 16px 34px; font-size: 1rem; font-weight: bold;
        letter-spacing: .5px; color: #121212; background: #00e676; border: none; border-radius: 10px;
        cursor: pointer; box-shadow: 0 0 20px rgba(0,230,118,.4);
    }
    #startGameBtn:active { transform: scale(0.97); }

    #version-badge { position: fixed; top: 4px; left: 50%; transform: translateX(-50%); font-family: monospace; font-size: 0.7rem; color: #ffca28; background: rgba(0,0,0,0.5); padding: 2px 10px; border-radius: 4px; z-index: 100; pointer-events: none; }

    /* ---- 2. képernyő: játék ---- */
    #screen-game { position: relative; display: flex; align-items: center; justify-content: center; background: #050208; }
    canvas { display: block; max-width: 100%; max-height: 100%; background: #000; box-shadow: 0 0 40px rgba(255,90,50,.15); }
    #hud { position: absolute; top: 14px; left: 14px; font-size: 13px; letter-spacing: .5px; background: rgba(10,6,14,.55); padding: 8px 12px; border-radius: 6px; }
    #hud b { color: #ff5a3c; }
    #weather { position: absolute; top: 14px; right: 14px; display: flex; gap: 6px; }
    .wbtn { background: rgba(10,6,14,.55); border: 1px solid rgba(255,255,255,.15); color: #eee; font-size: 12px; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
    .wbtn.active { background: #ff5a3c; border-color: #ff5a3c; color: #1a0a06; font-weight: 600; }
    #help { position: absolute; bottom: 14px; left: 14px; font-size: 12px; color: #bbb; background: rgba(10,6,14,.5); padding: 8px 12px; border-radius: 6px; }
    #resetBtn { position: absolute; top: 14px; left: 14px; font-size: 12px; font-weight: 600; color: #eee; background: rgba(10,6,14,.55); border: 1px solid rgba(255,255,255,.2); padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    #resetBtn:active { transform: scale(0.96); }
</style>
</head>
<body>
<div id="version-badge">v11 - SAVVALTOS</div>

<!-- ============ 1. KÉPERNYŐ: KALIBRÁCIÓ ============ -->
<div id="screen-calib" class="screen">
    <div id="gamepad-container">
        <div class="action-btn" id="btn-tl">G1<br><span>KALIBRÁL</span></div>
        <div class="action-btn" id="btn-tr">G2<br><span>INDÍTÁS</span></div>
        <div class="action-btn" id="btn-br">G4<br><span>AKCIÓ</span></div>

        <div id="center-panel">
            <div id="telemetry">Szenzorok: Inaktív</div>
            <div class="compass-grid">
                <div class="arrow" id="dir-n">↑</div>
                <div class="arrow" id="dir-w">←</div>
                <div class="arrow" id="dir-c">KÖZÉP</div>
                <div class="arrow" id="dir-e">→</div>
                <div class="arrow" id="dir-s">↓</div>
            </div>
        </div>
    </div>
    <button id="startGameBtn">JÁTÉK INDÍTÁSA ▶</button>
</div>

<!-- ============ 2. KÉPERNYŐ: JÁTÉK ============ -->
<div id="screen-game" class="screen hidden">
    <canvas id="game" width="1000" height="600"></canvas>
    <button id="resetBtn">↺ KÖZÉPRE</button>
    <div id="hud">sebesség: <b id="speedVal">0</b> km/h &nbsp;|&nbsp; pont: <b id="scoreVal">0</b> &nbsp;|&nbsp; ütközés: <b id="crashVal">0</b></div>
    <div id="weather">
        <button class="wbtn active" data-w="sunny">napos</button>
        <button class="wbtn" data-w="sunset">naplemente</button>
        <button class="wbtn" data-w="rainy">esős</button>
        <button class="wbtn" data-w="snowy">havas</button>
    </div>
    <div id="help">gyorsítás: hátradőlés &nbsp; lassítás: előredőlés &nbsp; sávváltás: dőlj/fordulj balra-jobbra, majd vissza középre<br>(billentyűzettel is: ↑↓ gáz-fék, ←→ / A D sávváltás)</div>
</div>

<script>
// ============================================================
// 1) MOZGÁSÉRZÉKELŐ VEZÉRLŐ (kalibráció + fel/le/balra/jobbra állapotgép)
// ============================================================
const APP_VERSION = "v11 - SAVVALTOS";
document.getElementById('version-badge').textContent = APP_VERSION;
document.title = "Mozgásvezérelt sávváltós sportkocsi " + APP_VERSION;

const CONFIG = {
    TILT_ENTER: 2.5, TILT_EXIT: 1.0,
    TURN_ENTER: 30, TURN_EXIT: 12,
    PLAUSIBLE_MAX_DELTA: 100,
    SETTLE_ROT_DEG_S: 8, SETTLE_MS: 150,
    COMPASS_SAFE_TILT: 2.0
};

let isRunning = false;
let guideStarted = false;
let buttonStates = { G1: 0, G2: 0, G4: 0 };

let raw = {
    ori_alpha: null, ori_beta: null, ori_gamma: null,
    acc_x: null, acc_y: null, acc_z: null,
    accG_x: null, accG_y: null, accG_z: null,
    rot_alpha: null, rot_beta: null, rot_gamma: null,
    motion_interval: null
};

let isCalibrated = false, calibAlpha = 0, baselineAccGZ = 0, yawRel = 0, lastMotionTime = null;
let tiltState = 'KOZEP', turnState = 'KOZEP', turnCandidate = 'KOZEP', settleTimer = 0, lastTickTime = null;
let tiltStateSince = 0, turnStateSince = 0; // biztonsági időzítő: ha egy állapot túl sokáig "beragad", kényszerítve KOZEP-re állunk

// ezt olvassa a játék: 'KOZEP' | 'FEL' | 'LE' | 'BAL' | 'JOBB'
let motionState = 'KOZEP';
let prevMotionState = 'KOZEP';

const telemetryEl = document.getElementById('telemetry');
const btnTR = document.getElementById('btn-tr');
const startGameBtn = document.getElementById('startGameBtn');

const setupButton = (elementId, key, callbackPress) => {
    const btn = document.getElementById(elementId);
    btn.addEventListener('touchstart', (e) => {
        e.preventDefault(); btn.classList.add('active'); buttonStates[key] = 1;
        if (guideWaitingForAny) startSensors();
        notifyButtonPress(key);
        if (callbackPress) callbackPress();
    }, { passive: false });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); btn.classList.remove('active'); buttonStates[key] = 0; }, { passive: false });
    btn.addEventListener('mousedown', () => {
        btn.classList.add('active'); buttonStates[key] = 1;
        if (guideWaitingForAny) startSensors();
        notifyButtonPress(key);
        if (callbackPress) callbackPress();
    });
    btn.addEventListener('mouseup', () => { btn.classList.remove('active'); buttonStates[key] = 0; });
};
setupButton('btn-tl', 'G1', () => { calibrate(); });
setupButton('btn-tr', 'G2', () => { startSensors(); });
setupButton('btn-br', 'G4', null);

window.addEventListener('load', () => { if (!guideStarted) { guideStarted = true; runGuidedSequence(); } });

const HISTORY_LEN = 7;
let historyAlpha = [], historyBeta = [], historyAccGZ = [];
function median(arr) { if (arr.length === 0) return 0; const s = [...arr].sort((a, b) => a - b); return s[Math.floor(s.length / 2)]; }
function pushHistory() {
    if (raw.ori_alpha !== null) { historyAlpha.push(raw.ori_alpha); if (historyAlpha.length > HISTORY_LEN) historyAlpha.shift(); }
    if (raw.ori_beta !== null) { historyBeta.push(raw.ori_beta); if (historyBeta.length > HISTORY_LEN) historyBeta.shift(); }
    if (raw.accG_z !== null) { historyAccGZ.push(raw.accG_z); if (historyAccGZ.length > HISTORY_LEN) historyAccGZ.shift(); }
}
function isFlippedFiltered() { return Math.abs(median(historyBeta)) > 150; }

function calibrate() {
    const goodAlphas = [], goodAccGZ = [];
    for (let i = 0; i < historyBeta.length; i++) {
        if (Math.abs(historyBeta[i]) <= 150) {
            if (historyAlpha[i] !== undefined) goodAlphas.push(historyAlpha[i]);
            if (historyAccGZ[i] !== undefined) goodAccGZ.push(historyAccGZ[i]);
        }
    }
    calibAlpha = goodAlphas.length > 0 ? median(goodAlphas) : ((raw.ori_alpha || 0) + 180) % 360;
    baselineAccGZ = goodAccGZ.length > 0 ? median(goodAccGZ) : (raw.accG_z || 0);
    yawRel = 0; turnState = 'KOZEP'; turnCandidate = 'KOZEP'; tiltState = 'KOZEP'; settleTimer = 0;
    isCalibrated = true;
}

async function startSensors() {
    if (isRunning) return;
    try {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            if (await DeviceOrientationEvent.requestPermission() !== 'granted') { alert("Szenzor hozzáférés elutasítva (dőlés)!"); return; }
        }
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            if (await DeviceMotionEvent.requestPermission() !== 'granted') { alert("Szenzor hozzáférés elutasítva (gyorsulás)!"); return; }
        }
        window.addEventListener('deviceorientation', handleOrientation);
        window.addEventListener('devicemotion', handleMotion);
        isRunning = true;
        btnTR.classList.add('running'); btnTR.innerHTML = "G2<br><span>FUT...</span>";
        setInterval(sensorTick, 20);
    } catch (err) { alert("Szenzor hiba: " + err); }
}

function handleOrientation(event) { raw.ori_alpha = event.alpha; raw.ori_beta = event.beta; raw.ori_gamma = event.gamma; pushHistory(); }
function wrap180(deg) { let d = deg % 360; if (d > 180) d -= 360; if (d < -180) d += 360; return d; }

function handleMotion(event) {
    if (event.acceleration) { raw.acc_x = event.acceleration.x; raw.acc_y = event.acceleration.y; raw.acc_z = event.acceleration.z; }
    if (event.accelerationIncludingGravity) { raw.accG_x = event.accelerationIncludingGravity.x; raw.accG_y = event.accelerationIncludingGravity.y; raw.accG_z = event.accelerationIncludingGravity.z; }
    if (event.rotationRate) { raw.rot_alpha = event.rotationRate.alpha; raw.rot_beta = event.rotationRate.beta; raw.rot_gamma = event.rotationRate.gamma; }
    raw.motion_interval = event.interval;
    pushHistory();
    const now = performance.now();
    if (isCalibrated && lastMotionTime !== null && raw.rot_alpha !== null) {
        let dt = (now - lastMotionTime) / 1000;
        if (dt > 0 && dt < 0.5) {
            yawRel += raw.rot_alpha * dt;
            const isYawSettled = Math.abs(raw.rot_alpha) < CONFIG.SETTLE_ROT_DEG_S;
            if (raw.accG_z !== null && raw.ori_alpha !== null && !isFlippedFiltered() && isYawSettled) {
                const deltaZ = Math.abs(median(historyAccGZ) - baselineAccGZ);
                if (deltaZ < CONFIG.COMPASS_SAFE_TILT) {
                    const compassDelta = wrap180(raw.ori_alpha - calibAlpha);
                    if (Math.abs(compassDelta) < CONFIG.PLAUSIBLE_MAX_DELTA) yawRel = compassDelta;
                }
            }
        }
    }
    lastMotionTime = now;
}

function updateTiltState() {
    if (!isCalibrated || historyAccGZ.length === 0) return;
    const deltaZ = median(historyAccGZ) - baselineAccGZ;
    const prev = tiltState;
    if (tiltState === 'KOZEP') { if (deltaZ > CONFIG.TILT_ENTER) tiltState = 'FEL'; else if (deltaZ < -CONFIG.TILT_ENTER) tiltState = 'LE'; }
    else if (tiltState === 'FEL') { if (deltaZ < CONFIG.TILT_EXIT) tiltState = 'KOZEP'; }
    else if (tiltState === 'LE') { if (deltaZ > -CONFIG.TILT_EXIT) tiltState = 'KOZEP'; }
    if (tiltState !== prev) tiltStateSince = performance.now();
    // biztonsági szelep: ha 4 másodpercnél tovább "beragadt" FEL/LE-ben (pl. szenzor-drift miatt),
    // kényszerítve visszaállunk KÖZÉP-re, hogy a gáz/fék ne fagyjon le véglegesen
    if (tiltState !== 'KOZEP' && performance.now() - tiltStateSince > 4000) {
        tiltState = 'KOZEP'; tiltStateSince = performance.now();
    }
}
function updateTurnState(dtMs) {
    if (!isCalibrated || raw.rot_alpha === null) return;
    if (turnState === 'KOZEP') { turnCandidate = yawRel > CONFIG.TURN_ENTER ? 'BAL' : (yawRel < -CONFIG.TURN_ENTER ? 'JOBB' : 'KOZEP'); }
    else if (turnState === 'BAL') { turnCandidate = (yawRel < CONFIG.TURN_EXIT) ? 'KOZEP' : 'BAL'; }
    else if (turnState === 'JOBB') { turnCandidate = (yawRel > -CONFIG.TURN_EXIT) ? 'KOZEP' : 'JOBB'; }
    if (Math.abs(raw.rot_alpha) < CONFIG.SETTLE_ROT_DEG_S) settleTimer += dtMs; else settleTimer = 0;
    const prev = turnState;
    if (turnCandidate !== turnState && settleTimer >= CONFIG.SETTLE_MS) turnState = turnCandidate;
    if (turnState !== prev) turnStateSince = performance.now();
    if (turnState !== 'KOZEP' && performance.now() - turnStateSince > 4000) {
        turnState = 'KOZEP'; turnCandidate = 'KOZEP'; turnStateSince = performance.now();
    }
}
function combinedStateId() {
    if (turnState === 'BAL') return 'BAL';
    if (turnState === 'JOBB') return 'JOBB';
    if (tiltState === 'FEL') return 'FEL';
    if (tiltState === 'LE') return 'LE';
    return 'KOZEP';
}
function updateVisualArrows(stateId) {
    document.querySelectorAll('.arrow').forEach(el => el.classList.remove('active'));
    const map = { 'KOZEP': 'dir-c', 'FEL': 'dir-n', 'LE': 'dir-s', 'BAL': 'dir-w', 'JOBB': 'dir-e' };
    const id = map[stateId];
    if (id) document.getElementById(id).classList.add('active');
}
function fmt(v, d) { return (v === null || v === undefined || isNaN(v)) ? '--' : v.toFixed(d === undefined ? 1 : d); }

function sensorTick() {
    if (!isRunning) return;
    const now = performance.now();
    const dtMs = lastTickTime !== null ? (now - lastTickTime) : 20;
    lastTickTime = now;

    updateTiltState();
    updateTurnState(dtMs);
    const stateId = combinedStateId();
    motionState = stateId;

    // sávváltás: csak ÁTMENETKOR (belépéskor BAL/JOBB-ba), nem folyamatosan
    if (motionState === 'BAL' && prevMotionState !== 'BAL') shiftLane(-1);
    if (motionState === 'JOBB' && prevMotionState !== 'JOBB') shiftLane(1);
    prevMotionState = motionState;

    updateVisualArrows(stateId);

    if (isCalibrated) startGameBtn.style.display = 'block';

    telemetryEl.innerHTML = `
        Szenzorok: <b>FUT</b><br>
        Kalibrálva: ${isCalibrated ? 'igen' : '<b>nem</b>'}<br>
        yawRel: <b>${fmt(yawRel)}</b>&deg;<br>
        Dőlés: <b>${tiltState}</b>&nbsp; Fordulás: <b>${turnState}</b><br>
        Állapot: <b>${stateId}</b>
    `;
}

let guideResolveButton = null, guideWaitingForAny = false, guideWaitingForKey = null;
function speak(text) {
    return new Promise((resolve) => {
        if (!('speechSynthesis' in window)) { resolve(); return; }
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'hu-HU'; u.rate = 1; u.onend = resolve; u.onerror = resolve;
        window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
    });
}
function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
function waitForButton(key) {
    return new Promise((resolve) => {
        if (key === 'any') { guideWaitingForAny = true; guideWaitingForKey = null; }
        else { guideWaitingForAny = false; guideWaitingForKey = key; }
        guideResolveButton = () => { guideWaitingForAny = false; guideWaitingForKey = null; guideResolveButton = null; resolve(); };
    });
}
function notifyButtonPress(key) { if (guideResolveButton && (guideWaitingForAny || guideWaitingForKey === key)) guideResolveButton(); }

async function runGuidedSequence() {
    await speak("Állj fel, legyen körülötted legalább egy méter szabad hely. Ha készen állsz, nyomj meg bármelyik gombot.");
    await waitForButton('any');
    await speak("Tartsd a telefont egyenesen magad előtt, majd nyomd meg a kalibráló gombot.");
    await waitForButton('G1');
    await wait(500);
    await speak("Dőlj hátra a telefonnal. Ez lesz a gyorsítás.");
    await wait(3000);
    await speak("Állj egyenesen.");
    await wait(2000);
    await speak("Dőlj előre a telefonnal. Ez lesz a lassítás.");
    await wait(3000);
    await speak("Állj egyenesen.");
    await wait(2000);
    await speak("Fordulj balra, és ott állj meg. Ez egy sávot lép balra.");
    await wait(3000);
    await speak("Fordulj vissza középre.");
    await wait(2000);
    await speak("Fordulj jobbra, és ott állj meg. Ez egy sávot lép jobbra.");
    await wait(3000);
    await speak("Fordulj vissza középre.");
    await wait(2000);
    await speak("Kész a kalibráció. Nyomd meg a Játék indítása gombot.");
}

// ============================================================
// 2) A JÁTÉK - 3 sávos, hullámokban jövő forgalommal
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const WIDTH = canvas.width, HEIGHT = canvas.height;

const segmentLength = 200;
const roadWidth = 1600;
const rumbleLength = 3;
const drawDistance = 180;
const cameraHeight = 2100;
const fieldOfView = 100;
const cameraDepth = 1 / Math.tan((fieldOfView / 2) * Math.PI / 180);

const maxSpeed = segmentLength * 20;
const accel = maxSpeed / 2.0;
const braking = -maxSpeed * 1.3;
const decel = -maxSpeed / 2.5;

const laneX = [-2/3, 0, 2/3];
let laneIndex = 1;
function shiftLane(dir) { laneIndex = Math.max(0, Math.min(2, laneIndex + dir)); }

const COLORS = {
    LIGHT: { road: '#6b6b70', grass: '#2f6b3a', rumble: '#d9d9d9', lane: '#d9d9d9' },
    DARK: { road: '#636368', grass: '#2a5f34', rumble: '#b3312c', lane: null }
};
const WEATHER = {
    sunny: { sky: ['#8fd3f4', '#e7f3ff'], tint: 'rgba(255,244,214,0.08)', particles: null },
    sunset: { sky: ['#2b1050', '#ff7a45', '#ffd27a'], tint: 'rgba(255,140,90,0.16)', particles: null },
    rainy: { sky: ['#4a5560', '#8a95a0'], tint: 'rgba(170,190,205,0.14)', particles: 'rain' },
    snowy: { sky: ['#c9d6e0', '#eef3f6'], tint: 'rgba(255,255,255,0.16)', particles: 'snow' }
};
let currentWeather = 'sunny';

let segments = [];
function addSegment(curve) {
    const n = segments.length;
    segments.push({ index: n, p1: { world: { z: n * segmentLength }, screen: {} }, p2: { world: { z: (n + 1) * segmentLength }, screen: {} }, curve, color: (Math.floor(n / rumbleLength) % 2) ? COLORS.DARK : COLORS.LIGHT, sprites: [] });
}
function easeIn(a, b, p) { return a + (b - a) * p * p; }
function easeInOut(a, b, p) { return a + (b - a) * ((-Math.cos(p * Math.PI) / 2) + 0.5); }
function addRoad(enter, hold, leave, curve) {
    for (let i = 0; i < enter; i++) addSegment(easeIn(0, curve, i / enter));
    for (let i = 0; i < hold; i++) addSegment(curve);
    for (let i = 0; i < leave; i++) addSegment(easeInOut(curve, 0, i / leave));
}
function addSprite(segIndex, offset, w, h, color) { segments[segIndex % segments.length].sprites.push({ offset, w, h, color }); }

function buildTrack() {
    addRoad(60, 40, 0, 0);
    addRoad(40, 60, 60, 4.2);
    addRoad(60, 40, 0, 0);
    addRoad(40, 60, 60, -4.2);
    addRoad(60, 40, 0, 0);
    addRoad(30, 40, 30, 7);
    addRoad(30, 40, 30, -7);
    addRoad(80, 40, 0, 0);
    for (let i = 10; i < segments.length; i += 14) {
        const side = ((i / 14) | 0) % 2 === 0 ? -1 : 1;
        addSprite(i, side * 1.35, 90, 220, '#1c5a2e');
    }
    for (let i = 25; i < segments.length; i += 55) addSprite(i, 1.6, 60, 140, '#c9c9c9');
}
buildTrack();
const trackLength = segments.length * segmentLength;
function findSegment(z) { return segments[Math.floor(z / segmentLength) % segments.length]; }
function percentRemaining(z, len) { return (z % len) / len; }

function project(p, cameraX, cameraY, cameraZ, camDepth, width, height, roadW) {
    const transX = -cameraX, transY = -cameraY;
    const transZ = (p.world.z || 0) - cameraZ;
    const scale = camDepth / transZ;
    p.screen.scale = scale; p.screen.z = transZ;
    p.screen.x = Math.round((width / 2) + (scale * transX * width / 2));
    p.screen.y = Math.round((height / 2) - (scale * transY * height / 2));
    p.screen.w = Math.round(scale * roadW * width / 2);
}

let position = 0, distanceTraveled = 0, playerX = laneX[1], speed = 0, score = 0, crashCount = 0, crashFlash = 0, invulnerable = false;

// ---- végtelen forgalom: mindig előre spawnolunk, és akit lehagytunk, azonnal megszűnik ----
// distanceTraveled = a játékos abszolút, sosem-wrap-elő megtett távolsága
// aiCars[].z ugyanebben az abszolút koordinátában él, így "mögé kerülés" fogalmilag sem létezhet
const carColors = ['#3d7dff', '#ffd23d', '#8f3dff', '#3dffb0', '#ff8f3d'];
const trafficSpeed = maxSpeed * 0.42;
const startClearZone = 18000;  // ennyi ideig üres a pálya az elején, hogy be lehessen szokni
const minCarGap = 2800;        // ezután csak 1-1 autó tűnik fel, nagy térközzel
const maxCarGap = 4800;
const spawnLookahead = drawDistance * segmentLength * 1.3;
let aiCars = [];
let nextSpawnZ = startClearZone;
function updateTraffic(dt) {
    aiCars.forEach(c => c.z += trafficSpeed * dt);
    while (nextSpawnZ < distanceTraveled + spawnLookahead) {
        const lane = Math.floor(Math.random() * 3);
        aiCars.push({ z: nextSpawnZ, lane, color: carColors[Math.floor(Math.random() * carColors.length)] });
        nextSpawnZ += minCarGap + Math.random() * (maxCarGap - minCarGap);
    }
    // akit lehagytunk, az azonnal, véglegesen megszűnik - sosem térhet vissza mögülünk
    aiCars = aiCars.filter(c => c.z > distanceTraveled);
}

const keys = {};
window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (!keys[k]) {
        if (k === 'arrowleft' || k === 'a') shiftLane(-1);
        if (k === 'arrowright' || k === 'd') shiftLane(1);
    }
    keys[k] = true;
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

let particles = [];
function seedParticles() {
    particles = [];
    const count = currentWeather === 'rainy' ? 140 : (currentWeather === 'snowy' ? 110 : 0);
    for (let i = 0; i < count; i++) particles.push({ x: Math.random() * WIDTH, y: Math.random() * HEIGHT, s: 1 + Math.random() * 2 });
}
seedParticles();

        currentWeather = btn.dataset.w;
        seedParticles();
    });
});

let gameActive = false;
function resetGame() {
    position = 0; distanceTraveled = 0; speed = 0; laneIndex = 1; playerX = laneX[1];
    score = 0; crashCount = 0; crashFlash = 0; invulnerable = false;
    aiCars = []; nextSpawnZ = startClearZone;
}
document.getElementById('resetBtn').addEventListener('click', () => {
    laneIndex = 1; playerX = laneX[1];
    crashFlash = 0; invulnerable = false;
    tiltState = 'KOZEP'; turnState = 'KOZEP'; turnCandidate = 'KOZEP';
    tiltStateSince = performance.now(); turnStateSince = performance.now();
});

startGameBtn.addEventListener('click', () => {
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
    }
    document.getElementById('screen-calib').classList.add('hidden');
    document.getElementById('screen-game').classList.remove('hidden');
    resetGame();
    gameActive = true;
});

function update(dt) {
    position += speed * dt;
    distanceTraveled += speed * dt;
    if (position >= trackLength) position -= trackLength;
    if (position < 0) position += trackLength;

    const speedRatio = speed / maxSpeed;
    playerX += (laneX[laneIndex] - playerX) * Math.min(1, dt * 8);

    // a telefon-mozgás gyorsítás/lassulás iránya a korábbi teszt alapján fordítva volt,
    // ezért itt LE = gyorsítás, FEL = fékezés (a fizikai "hátradőlés = gyorsítás" élmény változatlan)
    if (keys['arrowup'] || keys['w'] || motionState === 'LE') speed += accel * dt;
    else if (keys['arrowdown'] || keys['s'] || motionState === 'FEL') speed += braking * dt;
    // sem gáz, sem fék: az autó megtartja a sebességét, nem lassul magától
    speed = Math.max(0, Math.min(maxSpeed, speed));

    updateTraffic(dt);

    if (!invulnerable) {
        for (const c of aiCars) {
            // aiCars csak előttünk lévő autókat tartalmaz (updateTraffic azonnal törli, amit lehagytunk),
            // így hátulról jövő ütközés fogalmilag sem történhet
            const forwardDist = c.z - distanceTraveled;
            if (c.lane === laneIndex && forwardDist < 260) {
                speed *= 0.3; crashCount++; crashFlash = 1; invulnerable = true;
                setTimeout(() => invulnerable = false, 900);
                break;
            }
        }
    }
    crashFlash = Math.max(0, crashFlash - dt * 1.6);

    score += speed * dt * 0.01;
    document.getElementById('speedVal').textContent = Math.round(speedRatio * 220);
    document.getElementById('scoreVal').textContent = Math.floor(score);
    document.getElementById('crashVal').textContent = crashCount;
}

function drawSky() {
    const w = WEATHER[currentWeather];
    const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT * 0.55);
    w.sky.forEach((c, i) => grad.addColorStop(i / (w.sky.length - 1), c));
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, WIDTH, HEIGHT * 0.55);
}
function drawParticles() {
    const w = WEATHER[currentWeather];
    if (!w.particles) return;
    if (w.particles === 'rain') {
        ctx.strokeStyle = 'rgba(210,225,240,0.55)'; ctx.lineWidth = 1;
        particles.forEach(p => {
            ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - 4, p.y + 14 * p.s); ctx.stroke();
            p.y += 9 * p.s; p.x -= 2 * p.s;
            if (p.y > HEIGHT) { p.y = -10; p.x = Math.random() * WIDTH; }
        });
    } else if (w.particles === 'snow') {
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        particles.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2); ctx.fill();
            p.y += 1.6 * p.s; p.x += Math.sin(p.y * 0.02) * 0.5;
            if (p.y > HEIGHT) { p.y = -6; p.x = Math.random() * WIDTH; }
        });
    }
}
function poly(x1, y1, x2, y2, x3, y3, x4, y4, color) {
    ctx.fillStyle = color; ctx.beginPath();
    ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x3, y3); ctx.lineTo(x4, y4);
    ctx.closePath(); ctx.fill();
}

function drawPlayerCar() {
    const y = HEIGHT - 130;
    ctx.save();
    ctx.translate(WIDTH / 2, y);
    if (carSpriteReady) {
        const dw = 220, dh = dw * (carSprite.naturalHeight / carSprite.naturalWidth);
        ctx.drawImage(carSprite, -dw / 2, -dh + 30, dw, dh);
    } else {
        const w = 170, h = 90;
        ctx.fillStyle = '#d9241c';
        ctx.fillRect(-w / 2, -h / 2, w, h);
        ctx.fillStyle = 'rgba(20,10,10,.55)';
        ctx.fillRect(-w / 2 + 20, -h / 2, w - 40, h * 0.45);
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(-w / 2 - 8, h / 2 - 14, 18, 20);
        ctx.fillRect(w / 2 - 10, h / 2 - 14, 18, 20);
    }
    ctx.restore();
}

function render() {
    ctx.clearRect(0, 0, WIDTH, HEIGHT);
    drawSky();

    const baseSegment = findSegment(position);
    const basePercent = percentRemaining(position, segmentLength);
    const camX = playerX * roadWidth;
    let x = 0, dx = -(baseSegment.curve * basePercent);

    const renderList = [];
    for (let n = 0; n < drawDistance; n++) {
        const segment = segments[(baseSegment.index + n) % segments.length];
        const looped = segment.index < baseSegment.index;
        const loopOffset = looped ? trackLength : 0;

        project(segment.p1, camX - x, cameraHeight, position - loopOffset, cameraDepth, WIDTH, HEIGHT, roadWidth);
        x += dx; dx += segment.curve;
        project(segment.p2, camX - x, cameraHeight, position - loopOffset, cameraDepth, WIDTH, HEIGHT, roadWidth);

        if (segment.p1.screen.z <= 0) continue;
        renderList.push(segment);
    }

    for (let i = renderList.length - 1; i >= 0; i--) {
        const seg = renderList[i];
        const p1 = seg.p1.screen, p2 = seg.p2.screen;
        const topY = Math.min(p1.y, p2.y), botY = Math.max(p1.y, p2.y);

        ctx.fillStyle = seg.color.grass;
        ctx.fillRect(0, topY, WIDTH, botY - topY);

        const r1 = p1.w * 1.15, r2 = p2.w * 1.15;
        poly(p1.x - r1, p1.y, p1.x + r1, p1.y, p2.x + r2, p2.y, p2.x - r2, p2.y, seg.color.rumble);
        poly(p1.x - p1.w, p1.y, p1.x + p1.w, p1.y, p2.x + p2.w, p2.y, p2.x - p2.w, p2.y, seg.color.road);

        if (seg.color.lane) {
            const lw1 = p1.w * 0.025, lw2 = p2.w * 0.025;
            [-1 / 3, 1 / 3].forEach(off => {
                const x1 = p1.x + off * p1.w, x2 = p2.x + off * p2.w;
                poly(x1 - lw1, p1.y, x1 + lw1, p1.y, x2 + lw2, p2.y, x2 - lw2, p2.y, seg.color.lane);
            });
        }

        seg.sprites.forEach(spr => {
            const scale = p1.scale;
            const sx = p1.x + spr.offset * p1.w;
            const sw = spr.w * scale, sh = spr.h * scale;
            ctx.fillStyle = spr.color;
            ctx.fillRect(sx - sw / 2, p1.y - sh, sw, sh);
        });

        aiCars.forEach(c => {
            if (findSegment(c.z % trackLength).index === seg.index) {
                const halfW = p1.w * 0.22, h = halfW * 1.3;
                const cx = p1.x + laneX[c.lane] * p1.w;
                ctx.fillStyle = c.color;
                ctx.fillRect(cx - halfW, p1.y - h, halfW * 2, h);
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(cx - halfW * 0.6, p1.y - h, halfW * 1.2, h * 0.4);
            }
        });
    }

    drawPlayerCar();
    ctx.fillStyle = WEATHER[currentWeather].tint;
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    drawParticles();

    if (crashFlash > 0) {
        ctx.fillStyle = `rgba(255,30,20,${crashFlash * 0.5})`;
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
    }
}

let lastTime = performance.now();
function frame(now) {
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    if (gameActive) { update(dt); render(); }
    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
