<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Digitális kimenet teszt</title>
<style>
  :root{
    --bg: #12151a; --panel: #1b1f27; --panel-2: #232834; --line: #2c313d;
    --text: #e8eaed; --text-dim: #8b93a3;
    --accent: #4fd1a5; --warn: #e8a23d; --danger: #e05d5d;
    --mono: 'SF Mono', 'Roboto Mono', Consolas, monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ background:var(--bg); color:var(--text); height:100%; overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  .hidden{ display:none !important; }

  /* ---------- intro (portrait-safe, shown before start) ---------- */
  #screenIntro{ height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:14px; padding:24px; }
  #screenIntro h1{ font-size:19px; }
  #screenIntro p{ color:var(--text-dim); font-size:13px; max-width:320px; line-height:1.5; }
  #screenIntro .rotate-hint{ font-size:34px; }
  button{ font-family:inherit; font-weight:600; border:none; border-radius:10px; cursor:pointer; }
  .btn-primary{ background:var(--accent); color:#0a1210; font-size:15px; padding:14px 22px; }

  /* ---------- main landscape layout ---------- */
  #screenMain{ height:100vh; width:100vw; display:flex; flex-direction:column; }

  .topbar{ height:42px; flex:0 0 auto; display:flex; align-items:center; gap:10px;
    padding:0 8px; border-bottom:1px solid var(--line); background:var(--panel); }
  .topbar .title{ font-size:12px; font-weight:700; white-space:nowrap; }
  .topbar .sens{ flex:1; display:flex; align-items:center; gap:6px; font-size:10.5px; color:var(--text-dim); }
  .topbar input[type=range]{ flex:1; accent-color:var(--accent); height:18px; }
  .topbar .sens-val{ font-family:var(--mono); width:32px; text-align:right; }
  .topbar .icon-btn{ background:var(--panel-2); border:1px solid var(--line); color:var(--text-dim);
    font-size:10.5px; padding:6px 9px; border-radius:8px; }
  .topbar .icon-btn.active{ color:var(--accent); border-color:var(--accent); }

  .main-row{ flex:1; display:flex; overflow:hidden; }

  .phys-btn{ flex:0 0 68px; display:flex; align-items:center; justify-content:center;
    background:var(--panel-2); border:none; font-size:12px; font-weight:700; color:var(--text-dim);
    writing-mode:vertical-rl; letter-spacing:0.05em; }
  .phys-btn.pressed{ background:rgba(79,209,165,0.22); color:var(--accent); }
  .phys-btn.left{ border-right:1px solid var(--line); }
  .phys-btn.right{ border-left:1px solid var(--line); }

  .gesture-area{ flex:1; overflow:auto; padding:6px; }
  .gesture-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(78px, 1fr));
    grid-auto-rows:1fr; gap:5px; height:100%; }
  .gesture-btn{ background:var(--panel-2); border:1.5px solid var(--line); border-radius:9px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    transition:background .07s, border-color .07s; padding:2px; }
  .gesture-btn .icon{ font-size:17px; line-height:1; }
  .gesture-btn .label{ font-size:9px; color:var(--text-dim); text-align:center; line-height:1.15; }
  .gesture-btn.pressed{ background:rgba(79,209,165,0.2); border-color:var(--accent); }
  .gesture-btn.pressed .label{ color:var(--text); font-weight:700; }

  /* ---------- log overlay ---------- */
  #logOverlay{ position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:20;
    display:flex; align-items:center; justify-content:center; padding:14px; }
  #logPanel{ background:var(--panel); border:1px solid var(--line); border-radius:12px;
    width:100%; height:100%; display:flex; flex-direction:column; overflow:hidden; }
  #logPanel .log-head{ display:flex; align-items:center; justify-content:space-between;
    padding:8px 12px; border-bottom:1px solid var(--line); flex:0 0 auto; }
  #logPanel .log-head h2{ font-size:12px; }
  #logPanel .log-actions{ display:flex; gap:6px; }
  #logPanel .log-actions button{ font-size:10.5px; padding:6px 10px; background:var(--panel-2);
    color:var(--text-dim); border:1px solid var(--line); border-radius:7px; }
  #logList{ flex:1; overflow-y:auto; font-family:var(--mono); font-size:10px; padding:6px 10px; }
  .log-row{ padding:5px 0; border-bottom:1px solid var(--line); line-height:1.5; }
  .log-row .id{ color:var(--text); font-weight:700; }
  .log-row .down{ color:var(--accent); }
  .log-row .up{ color:var(--warn); }
  .log-row .params{ color:var(--text-dim); display:block; }
  .empty{ color:var(--text-dim); font-size:12px; text-align:center; padding:20px 0; }
</style>
</head>
<body>

<!-- ===================== INTRO ===================== -->
<div id="screenIntro">
  <div class="rotate-hint">📱↔️</div>
  <h1>Digitális kimenet teszt</h1>
  <p>Ezt a képernyőt <b>oldalra fordított (fekvő) telefonnal</b> használd,
     ugyanúgy, ahogy a játékban tartanád magad előtt.</p>
  <button class="btn-primary" id="permBtn">Szenzorok engedélyezése és indítás</button>
  <p id="profileNote" style="font-size:11.5px;"></p>
</div>

<!-- ===================== MAIN (landscape) ===================== -->
<div id="screenMain" class="hidden">
  <div class="topbar">
    <span class="title">Kimenet</span>
    <div class="sens">
      <span>Laza</span>
      <input type="range" id="sensSlider" min="20" max="80" value="45">
      <span>Szigorú</span>
      <span class="sens-val" id="sensVal">45%</span>
    </div>
    <button class="icon-btn" id="logToggleBtn">Log</button>
  </div>

  <div class="main-row">
    <div class="phys-btn left" id="btnLeft">BAL</div>

    <div class="gesture-area">
      <div class="gesture-grid" id="gestureGrid"></div>
    </div>

    <div class="phys-btn right" id="btnRight">JOBB</div>
  </div>
</div>

<!-- ===================== LOG OVERLAY ===================== -->
<div id="logOverlay" class="hidden">
  <div id="logPanel">
    <div class="log-head">
      <h2>Esemény-log — élő paraméterekkel</h2>
      <div class="log-actions">
        <button id="clearLogBtn">Törlés</button>
        <button id="exportLogBtn">Export JSON</button>
        <button id="closeLogBtn">Bezár</button>
      </div>
    </div>
    <div id="logList"><div class="empty">Még nincs esemény.</div></div>
  </div>
</div>

<script>
(function(){
  const CAL_KEY = 'motion_calibration_profile_v1';

  const DEFAULT_PROFILE = {
    baseline: { ax:0, ay:0, az:0, ra:0, rb:0, rg:0 },
    squat:     { dominantAxis:'rb', dominantSignedValue:35,  firstPeakSignedValue:35 },
    reach:     { dominantAxis:'rb', dominantSignedValue:-100, firstPeakSignedValue:-100 },
    sideLeft:  { dominantAxis:'ra', dominantSignedValue:28,  firstPeakSignedValue:28 },
    sideRight: { dominantAxis:'rb', dominantSignedValue:50,  firstPeakSignedValue:50 },
    stepBack:  { dominantAxis:'ay', dominantSignedValue:2.5, firstPeakSignedValue:2.5 },
    leanLeft:  { dominantAxis:'rg', dominantSignedValue:-55, firstPeakSignedValue:-55 },
    leanRight: { dominantAxis:'rg', dominantSignedValue:-65, firstPeakSignedValue:65 },
    turnLeft:  { dominantAxis:'ra', dominantSignedValue:126, firstPeakSignedValue:126 },
    turnRight: { dominantAxis:'ra', dominantSignedValue:178, firstPeakSignedValue:-178 },
    twistLeft: { dominantAxis:'ra', dominantSignedValue:60,  firstPeakSignedValue:60 },
    twistRight:{ dominantAxis:'ra', dominantSignedValue:60,  firstPeakSignedValue:-60 },
    phonePush: { dominantAxis:'rb', dominantSignedValue:58,  firstPeakSignedValue:58 },
    walk:      { peakAccelMag:2.3 },
    run:       { peakAccelMag:6.5 }
  };

  const DIRECTIONAL_GESTURES = [
    { id:'squat',      icon:'⬇️', label:'Guggolás' },
    { id:'reach',      icon:'⬆️', label:'Felnyúlás' },
    { id:'sideLeft',   icon:'⬅️', label:'Old.bal' },
    { id:'sideRight',  icon:'➡️', label:'Old.jobb' },
    { id:'stepBack',   icon:'⏪', label:'Hátra' },
    { id:'leanLeft',   icon:'↩️', label:'Dőlés bal' },
    { id:'leanRight',  icon:'↪️', label:'Dőlés jobb' },
    { id:'turnLeft',   icon:'↺', label:'Ford. bal' },
    { id:'turnRight',  icon:'↻', label:'Ford. jobb' },
    { id:'twistLeft',  icon:'🔄', label:'Csav. bal' },
    { id:'twistRight', icon:'🔃', label:'Csav. jobb' },
    { id:'phonePush',  icon:'📱', label:'Kinyújt' },
  ];

  let profile = DEFAULT_PROFILE;
  let usingRealProfile = false;
  try{
    const raw = localStorage.getItem(CAL_KEY);
    if(raw){ profile = Object.assign({}, DEFAULT_PROFILE, JSON.parse(raw)); usingRealProfile = true; }
  }catch(e){}
  document.getElementById('profileNote').textContent = usingRealProfile
    ? 'Kalibrációs profil betöltve ✓'
    : 'Nincs mentett profil — közelítő alapértékekkel indul.';

  const gestureState = {};
  DIRECTIONAL_GESTURES.forEach(function(g){ gestureState[g.id] = { pressed:false, smoothed:0 }; });
  gestureState.walk = { pressed:false, smoothed:0 };
  gestureState.run  = { pressed:false, smoothed:0 };
  gestureState.__mag = { smoothed:0 };

  let sensitivity = 0.45;
  const HYSTERESIS_RATIO = 0.6;
  const SMOOTH_ALPHA = 0.35;

  let baseline = { ax:0, ay:0, az:0, ra:0, rb:0, rg:0 };
  if(profile.baseline){ baseline = Object.assign({}, baseline, profile.baseline); }

  const eventLog = [];
  const activeSince = {};

  function handleMotion(e){
    const acc = e.acceleration || e.accelerationIncludingGravity || {};
    const rot = e.rotationRate || {};
    const raw = {
      ax: (acc.x||0) - baseline.ax, ay: (acc.y||0) - baseline.ay, az: (acc.z||0) - baseline.az,
      ra: (rot.alpha||0) - baseline.ra, rb: (rot.beta||0) - baseline.rb, rg: (rot.gamma||0) - baseline.rg
    };

    DIRECTIONAL_GESTURES.forEach(function(g){
      const cal = profile[g.id];
      if(!cal) return;
      const axis = cal.dominantAxis || 'ax';
      const calVal = (cal.firstPeakSignedValue !== undefined && cal.firstPeakSignedValue !== null)
        ? cal.firstPeakSignedValue : cal.dominantSignedValue;
      if(calVal === undefined || calVal === null) return;

      const liveRaw = raw[axis] !== undefined ? raw[axis] : 0;
      const st = gestureState[g.id];
      st.smoothed = st.smoothed + SMOOTH_ALPHA * (liveRaw - st.smoothed);

      const pressThr = calVal * sensitivity;
      const releaseThr = pressThr * HYSTERESIS_RATIO;

      let shouldPress, shouldRelease;
      if(calVal >= 0){ shouldPress = st.smoothed >= pressThr; shouldRelease = st.smoothed <= releaseThr; }
      else{ shouldPress = st.smoothed <= pressThr; shouldRelease = st.smoothed >= releaseThr; }

      const meta = { axis:axis, value: round3(st.smoothed), pressThr: round3(pressThr),
                     releaseThr: round3(releaseThr), sensitivity: sensitivity };

      if(!st.pressed && shouldPress){ setPressed(g.id, true, meta); }
      else if(st.pressed && shouldRelease){ setPressed(g.id, false, meta); }
    });

    const accelMag = Math.sqrt(raw.ax*raw.ax + raw.ay*raw.ay + raw.az*raw.az);
    const stMag = gestureState.__mag;
    stMag.smoothed = stMag.smoothed + SMOOTH_ALPHA * (accelMag - stMag.smoothed);

    const walkPeak = (profile.walk && profile.walk.peakAccelMag) || 2.3;
    const runPeak = (profile.run && profile.run.peakAccelMag) || 6.5;
    const runPress = runPeak * sensitivity, runRelease = runPress * HYSTERESIS_RATIO;
    const walkPress = walkPeak * sensitivity, walkRelease = walkPress * HYSTERESIS_RATIO;

    const runSt = gestureState.run;
    const runMeta = { axis:'accelMag', value: round3(stMag.smoothed), pressThr: round3(runPress),
                       releaseThr: round3(runRelease), sensitivity: sensitivity };
    if(!runSt.pressed && stMag.smoothed >= runPress){ setPressed('run', true, runMeta); }
    else if(runSt.pressed && stMag.smoothed <= runRelease){ setPressed('run', false, runMeta); }

    const walkSt = gestureState.walk;
    const walkMeta = { axis:'accelMag', value: round3(stMag.smoothed), pressThr: round3(walkPress),
                        releaseThr: round3(walkRelease), sensitivity: sensitivity };
    const walkCandidate = stMag.smoothed >= walkPress && stMag.smoothed < runPress;
    if(!walkSt.pressed && walkCandidate){ setPressed('walk', true, walkMeta); }
    else if(walkSt.pressed && stMag.smoothed <= walkRelease){ setPressed('walk', false, walkMeta); }
  }

  function round3(n){ return Math.round(n*1000)/1000; }

  function setPressed(id, pressed, meta){
    gestureState[id].pressed = pressed;
    logEvent(id, pressed ? 'down' : 'up', meta);
    renderGestureButton(id);
  }

  // ---------- permission & start ----------
  document.getElementById('permBtn').addEventListener('click', function(){
    const needsPerm = typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function';
    function start(){
      window.addEventListener('devicemotion', handleMotion);
      document.getElementById('screenIntro').classList.add('hidden');
      document.getElementById('screenMain').classList.remove('hidden');
      buildGestureGrid();
    }
    if(needsPerm){
      DeviceMotionEvent.requestPermission().then(function(r){
        if(r === 'granted'){ start(); } else{ alert('Szenzor-hozzáférés nélkül nem működik a teszt.'); }
      }).catch(function(){ alert('Hiba az engedélykérésnél.'); });
    }else{ start(); }
  });

  // ---------- sensitivity ----------
  const sensSlider = document.getElementById('sensSlider');
  const sensVal = document.getElementById('sensVal');
  sensSlider.addEventListener('input', function(){
    sensitivity = Number(sensSlider.value) / 100;
    sensVal.textContent = sensSlider.value + '%';
  });

  // ---------- gesture grid ----------
  const gestureGrid = document.getElementById('gestureGrid');
  function buildGestureGrid(){
    gestureGrid.innerHTML = '';
    const all = DIRECTIONAL_GESTURES.concat([
      { id:'walk', icon:'🚶', label:'Járás' },
      { id:'run',  icon:'🏃', label:'Futás' }
    ]);
    all.forEach(function(g){
      const el = document.createElement('div');
      el.className = 'gesture-btn';
      el.id = 'g_' + g.id;
      el.innerHTML = '<span class="icon">' + g.icon + '</span><span class="label">' + g.label + '</span>';
      gestureGrid.appendChild(el);
    });
  }
  function renderGestureButton(id){
    const el = document.getElementById('g_' + id);
    if(el) el.classList.toggle('pressed', gestureState[id].pressed);
  }

  // ---------- physical buttons ----------
  function wirePhysButton(el, id){
    function down(ev){ ev.preventDefault(); el.classList.add('pressed'); logEvent(id, 'down', {}); }
    function up(ev){ ev.preventDefault(); el.classList.remove('pressed'); logEvent(id, 'up', {}); }
    el.addEventListener('pointerdown', down);
    el.addEventListener('pointerup', up);
    el.addEventListener('pointerleave', up);
  }
  wirePhysButton(document.getElementById('btnLeft'), 'buttonLeft');
  wirePhysButton(document.getElementById('btnRight'), 'buttonRight');

  // ---------- log ----------
  const logList = document.getElementById('logList');
  function logEvent(id, phase, meta){
    const now = performance.now();
    let holdMs = null;
    if(phase === 'down'){ activeSince[id] = now; }
    else if(phase === 'up' && activeSince[id] !== undefined){ holdMs = now - activeSince[id]; }
    eventLog.push(Object.assign({ id:id, phase:phase, t:Date.now(), holdMs:holdMs }, meta || {}));
    renderLog();
  }
  function renderLog(){
    const recent = eventLog.slice(-60).reverse();
    if(recent.length === 0){ logList.innerHTML = '<div class="empty">Még nincs esemény.</div>'; return; }
    logList.innerHTML = recent.map(function(e){
      const time = new Date(e.t).toLocaleTimeString('hu-HU', { hour12:false }) + '.' + String(e.t % 1000).padStart(3,'0');
      const holdText = e.holdMs !== null && e.holdMs !== undefined ? ' · tartás ' + (e.holdMs/1000).toFixed(2) + 's' : '';
      const paramsText = (e.axis !== undefined)
        ? 'tengely: ' + e.axis + ' · érték: ' + e.value + ' · le-küszöb: ' + e.pressThr +
          ' · fel-küszöb: ' + e.releaseThr + ' · érzékenység: ' + Math.round((e.sensitivity||0)*100) + '%'
        : '';
      return '<div class="log-row"><span class="id">' + e.id + '</span> — ' +
             '<span class="' + e.phase + '">' + (e.phase==='down'?'LE':'FEL') + '</span>' +
             holdText + ' · ' + time +
             (paramsText ? '<span class="params">' + paramsText + '</span>' : '') +
             '</div>';
    }).join('');
  }

  document.getElementById('logToggleBtn').addEventListener('click', function(){
    document.getElementById('logOverlay').classList.remove('hidden');
  });
  document.getElementById('closeLogBtn').addEventListener('click', function(){
    document.getElementById('logOverlay').classList.add('hidden');
  });
  document.getElementById('clearLogBtn').addEventListener('click', function(){
    eventLog.length = 0; renderLog();
  });
  document.getElementById('exportLogBtn').addEventListener('click', function(){
    const blob = new Blob([JSON.stringify(eventLog, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'digitalis_esemenynaplo.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
})();
</script>

</body>
</html>
